    </div>
  `);
  let fImp=d.imp||1;
  /* モーダル上部のサンプルバー: 実際のガントバーと同じ配色・アイコン・カテゴリタグをその場で反映する(期限はモーダル内に表現できる場所が無いため対象外) */
  function updatePreviewBar(){
    const pv=$("#fPreviewBar");
    if(!pv)return;
    const name=$("#fName").value.trim()||"(名称未設定)";
    const mems=[...selM].map(id=>member(id)).filter(Boolean);
    const noAsgOn=$("#fNoAsg").checked;
    const cats=[...selC].map(id=>data.cats.find(c=>c.id===id)).filter(Boolean);
    const m=mems[0];
    pv.classList.remove("impB");
    pv.style.background=m?m.color:(noAsgOn?"var(--text)":"#A6ACB5");
    pv.style.color=noAsgOn?"var(--bg)":"#fff";
    if(fImp===3){pv.style.background="var(--imp)";pv.style.color="#fff";pv.classList.add("impB");}
    else if(fImp===2){pv.style.background="var(--imp2)";pv.style.color="#332800";pv.classList.add("impB");}
    const avMems=mems.slice(0,3);
    const avImgs=avMems.length?`<span class="bavstack">${avMems.map(x=>x.icon?`<img src="${x.icon}" alt="">`:`<span class="cdot" style="background:${x.color}"></span>`).join("")}</span>`:"";
    const bcat=cats.map(c=>`<span class="bcat"><span class="cdot" style="background:${c.color}"></span>${esc(c.name)}</span>`).join("");
    pv.innerHTML=`<span class="blabel">${avImgs}<span class="lbl">${esc(name)}</span>${bcat}</span>`;
  }
  document.querySelectorAll("#fImpSeg button").forEach(b=>b.onclick=()=>{
    fImp=+b.dataset.imp;
    document.querySelectorAll("#fImpSeg button").forEach(x=>x.classList.toggle("on",x===b));
    updatePreviewBar();
  });
  $("#fCancel").onclick=closeModal;
  if(!isNew)$("#fDup").onclick=()=>{closeModal();duplicateTask(t);};
  $("#fName").addEventListener("input",updatePreviewBar);
  /* 複数選択チップの状態管理 */
  const selM=new Set(d.memberIds||[]);
  const selC=new Set(d.catIds||[]);
  $("#fNoAsg").checked=!!d.noAsg&&!selM.size;
  const drawMemChips=()=>{
    $("#fMems").innerHTML=data.members.length
      ?data.members.map(m=>`<span class="chip${selM.has(m.id)?" on":""}" data-mid="${m.id}">${m.icon?`<img class="chipIcon" src="${m.icon}">`:`<span class="cdot" style="background:${m.color}"></span>`}${esc(m.name)}</span>`).join("")
      :`<span style="font-size:11px;color:var(--faint)">まだメンバーが登録されていません。</span>`;
    document.querySelectorAll("#fMems .chip").forEach(ch=>ch.onclick=()=>{
      const id=ch.dataset.mid;
      selM.has(id)?selM.delete(id):selM.add(id);
      if(selM.size)$("#fNoAsg").checked=false;
      drawMemChips();
    });
    updatePreviewBar();
  };
  const drawCatChips=()=>{
    $("#fCats").innerHTML=data.cats.length
      ?data.cats.map(c=>`<span class="chip${selC.has(c.id)?" on":""}" data-cid="${c.id}"><span class="cdot" style="background:${c.color}"></span>${esc(c.name)}</span>`).join("")
      :`<span style="font-size:11px;color:var(--faint)">まだカテゴリが登録されていません。</span>`;
    document.querySelectorAll("#fCats .chip").forEach(ch=>ch.onclick=()=>{
      const id=ch.dataset.cid;
      selC.has(id)?selC.delete(id):selC.add(id);
      drawCatChips();
    });
    updatePreviewBar();
  };
  drawMemChips();drawCatChips();
  $("#fNoAsg").addEventListener("change",()=>{
    if($("#fNoAsg").checked){selM.clear();drawMemChips();}
    updatePreviewBar();
  });
  const addCat=()=>{
    const n=$("#fCatNew").value.trim();if(!n)return;
    selC.add(ensureCat(n));
    $("#fCatNew").value="";
    drawCatChips();
    $("#fCatNew").focus();
  };
  $("#fCatNew").addEventListener("keydown",e=>{
    if(e.key!=="Enter"||e.isComposing)return;
    e.preventDefault();
    addCat();
  });
  let fMemIcon=null;
  let fMemColor=PALETTE[data.members.length%PALETTE.length];
  $("#fMemColorDot").style.background=fMemColor;
  $("#fMemPalRow").innerHTML=PALETTE.map(c=>`<div class="sw${c===fMemColor?" on":""}" data-c="${c}" style="background:${c}"></div>`).join("")+
    `<input type="color" id="fMemColorCustom" value="${fMemColor}" title="カスタム色"><span class="plbl">カスタム</span>`;
  const setFMemColor=c=>{
    fMemColor=c;
    $("#fMemColorDot").style.background=c;
    document.querySelectorAll("#fMemPalRow .sw").forEach(s=>s.classList.toggle("on",s.dataset.c===c));
  };
  $("#fMemColorDot").onclick=()=>{
    const row=$("#fMemPalRow");
    row.style.display=row.style.display==="none"?"flex":"none";
  };
  document.querySelectorAll("#fMemPalRow .sw").forEach(sw=>sw.onclick=()=>setFMemColor(sw.dataset.c));
  $("#fMemColorCustom").addEventListener("input",()=>setFMemColor($("#fMemColorCustom").value));
  $("#fMemAvBtn").onclick=()=>{
    _avFileCallback=dataUrl=>{
      fMemIcon=dataUrl;
      $("#fMemAvBtn").innerHTML=`<img src="${dataUrl}">`;
    };
    $("#avFile").click();
  };
  const addMem=()=>{
    const n=$("#fMemNew").value.trim();if(!n)return;
    const mem={id:uid(),name:n,color:resolveMemberColor(n,fMemColor)};
    if(fMemIcon)mem.icon=fMemIcon;
    data.members.push(mem);
    scheduleSave();
    selM.add(mem.id);
    $("#fNoAsg").checked=false;
    $("#fMemNew").value="";
    fMemIcon=null;
    $("#fMemAvBtn").innerHTML="＋";
    fMemColor=PALETTE[data.members.length%PALETTE.length];
    $("#fMemColorDot").style.background=fMemColor;
    $("#fMemPalRow").style.display="none";
    drawMemChips();
    $("#fMemNew").focus();
  };
  $("#fMemNew").addEventListener("keydown",e=>{
    if(e.key!=="Enter"||e.isComposing)return;
    e.preventDefault();
    addMem();
  });
  $("#fSave").onclick=()=>{
    const name=$("#fName").value.trim();
    let s=$("#fStart").value,e=$("#fEnd").value;
    if(!name||!s||!e)return;
    if(parse(e)<parse(s))[s,e]=[e,s];
    const imp=fImp;
    const memberIds=[...selM];
    const noAsg=!memberIds.length&&$("#fNoAsg").checked;
    const catIds=[...selC];
    if(isNew){
      data.tasks.push({id:uid(),name,memberIds,noAsg,phase:resolveTaskPhase(""),start:s,end:e,imp,catIds});
    }else{
      Object.assign(t,{name,memberIds,noAsg,start:s,end:e,imp,catIds}); /* phaseは対象外(このモーダルでは変更しない。ドラッグで変更できる) */
    }
    scheduleSave();closeModal();render();
  };
  if(!isNew)$("#fDel").onclick=()=>{
    data.tasks=data.tasks.filter(x=>x.id!==t.id);
    scheduleSave();closeModal();render();
  };
  $("#fName").focus();
}

/* ヘッダー画像: 横長(21:6目安)に切り出し、幅1400pxまでに縮小して保存 */
function readHeaderImageFile(f){
  return new Promise((res,rej)=>{
    const img=new Image();
    const url=URL.createObjectURL(f);
    img.onload=()=>{
      const targetRatio=21/6;
      let sw=img.width,sh=img.height,sx=0,sy=0;
      if(sw/sh>targetRatio){ sw=sh*targetRatio; sx=(img.width-sw)/2; }
      else{ sh=sw/targetRatio; sy=(img.height-sh)/2; }
      const outW=Math.min(1400,Math.round(sw));
      const outH=Math.round(outW/targetRatio);
      const c=document.createElement("canvas");c.width=outW;c.height=outH;
      c.getContext("2d").drawImage(img,sx,sy,sw,sh,0,0,outW,outH);
      URL.revokeObjectURL(url);
      res(c.toDataURL("image/jpeg",0.86));
    };
    img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error("画像を読み込めませんでした"));};
    img.src=url;
  });
}

  if(window.html2canvas)return Promise.resolve();

    const sc=document.createElement("script");
    sc.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";

/* 印刷/PDF: 1枚に無理に収めず、日付範囲でヨコ方向に複数ページへ自然分割する。
   左側のタスク一覧は各ページで繰り返し表示し、どのページを見てもタスク名が分かるようにする */
function buildPrintPages(){
  const container=$("#printPages");
  container.innerHTML="";
  const lpane=$("#lpane"),rinner=$("#rinner");
  const leftW=lpane.getBoundingClientRect().width;
  const tW=_rs?_rs.tW:rinner.scrollWidth;
  const fullH=rinner.scrollHeight;
  const pxPerMm=96/25.4;
  const pageWpx=(297-16)*pxPerMm,pageHpx=(210-16)*pxPerMm; /* A4横向き、余白8mm×2を差し引いた印刷可能領域 */
  const winW=Math.max(pageWpx-leftW,120);
  const numPages=Math.max(1,Math.ceil(tW/winW));
  const cleanClone=el=>{
    const c=el.cloneNode(true);
    c.querySelectorAll(".grip,.rowAdd,#hoverCol,#hoverDate,.colRes").forEach(x=>x.remove());
    return c;
  };
  const lheadC=cleanClone($("#lhead")),lbodyC=cleanClone($("#lbody"));
  lbodyC.style.transform="none";
  for(let i=0;i<numPages;i++){
    const page=document.createElement("div");page.className="printPage";
    const leftCol=document.createElement("div");leftCol.className="printPageLeft";
    leftCol.style.width=leftW+"px";
    leftCol.appendChild(i===0?lheadC:lheadC.cloneNode(true));
    leftCol.appendChild(i===0?lbodyC:lbodyC.cloneNode(true));
    page.appendChild(leftCol);
    const win=document.createElement("div");win.className="printPageWin";
    win.style.width=winW+"px";
    win.style.height=fullH+"px";
    const rinnerC=cleanClone(rinner);
    rinnerC.style.position="relative";
    rinnerC.style.left=(-i*winW)+"px";
    win.appendChild(rinnerC);
    page.appendChild(win);
    container.appendChild(page);
  }
}

/* position:stickyがスクロールコンテナとの相性で効かないことがあるため、バー内のアイコン/タスク名・
   月/年ラベルは、スクロールに合わせてJSで位置を計算して追従させる(read/writeを分離し、レイアウトを都度読まない) */
let _stickyItems=null; /* render()のたびに再構築するキャッシュ。scroll中はこれを見るだけで、レイアウトを一切読まない */
function rebuildStickyCache(){
  _stickyItems=[];
  document.querySelectorAll("#rinner .bar").forEach(bar=>{
    const bl=bar.querySelector(".blabel");
    if(bl)_stickyItems.push({el:bar,bl,blW:bl.offsetWidth,cur:null,inset:BLABEL_BASE_INSET*2});
  });
  /* 範囲マイルストーン(msband)の文字も、バーと同じ考え方でスクロールに追従させる(元は.mbwrapにposition:stickyを使っていたが、
     zoomプロパティとの相性問題でバーと同じ不具合が起きるため、同じJS計算方式に統一する) */
  document.querySelectorAll("#rinner .msband").forEach(band=>{
    const bl=band.querySelector(".mbwrap");
    if(bl)_stickyItems.push({el:band,bl,blW:bl.offsetWidth,cur:null,inset:MSBAND_BASE_INSET});
  });
}
/* バーの左側の実際の余白(padding 8px + blabelのleft:6px = 14px)。ラベルはこの分だけ元々右に寄っているので、
   右端の余白を計算する際にもこの基準値を差し引く必要がある(これを忘れると余白が実質ゼロになってしまう) */
const BLABEL_BASE_INSET=14;
/* msbandの左右余白(padding 8px x 2辺 = 16px)。mbwrapはbarのblabelと違い追加のleftオフセットを持たないため14ではなく16 */
const MSBAND_BASE_INSET=16;
function updateStickyBlabels(){
  if(!_stickyItems)return false;
  const scrollLeft=$("#rpane").scrollLeft;
  let stillMoving=false;
  _stickyItems.forEach(item=>{
    const elLeft=parseFloat(item.el.style.left)||0;
    const elWidth=parseFloat(item.el.style.width)||0;
    let target=scrollLeft-elLeft;
    if(target<0)target=0;
    const maxOffset=Math.max(elWidth-item.blW-item.inset,0);
    if(target>maxOffset)target=maxOffset;
    if(item.cur===null)item.cur=target; /* 初回(新規描画直後)はいきなり合わせる */
    const diff=target-item.cur;
    if(Math.abs(diff)>0.4){
      item.cur+=diff*0.55; /* マウスの動きに滑らかに追従させつつ、遅れすぎて気持ち悪くならない程度の減衰にする */
      stillMoving=true;
    }else{
      item.cur=target;
    }
    const val=item.cur>0?`translateX(${item.cur}px)`:"";
    if(item.bl.style.transform!==val)item.bl.style.transform=val;
  });
  return stillMoving;
}
function updateMonthLabelTargets(){
  const s=$("#rpane").scrollLeft;
  /* 今どの月が左端に来ているか(=追従中のラベル)を特定し、その月にだけ西暦を付与する。
     元々西暦付き(先頭月・1月)はスクロールに関わらず常に表示。 */
  let activeIdx=-1;
  for(let i=0;i<_mlbls.length;i++){
    const it=_mlbls[i];
    if(s+2>=it.x0&&s+2<it.x1){activeIdx=i;break;}
  }
  for(let i=0;i<_mlbls.length;i++){
    const it=_mlbls[i];
    const showYear=it.origHasYear||i===activeIdx;
    const text=showYear?`${it.y}年${it.mo}月`:`${it.mo}月`;
    if(it.el.textContent!==text){
      it.el.textContent=text;
      it.w=it.el.offsetWidth; /* テキストが変わったとき(月境界をまたいだとき)だけ幅を測り直す */
    }
    if(it.w===undefined)it.w=it.el.offsetWidth;
    it.target=Math.min(Math.max(it.x0,s+2),Math.max(it.x1-it.w-2,it.x0));
    if(it.cur===undefined||it.cur===null)it.cur=it.target;
  }
}
function updateMonthLabelPositions(){
  let stillMoving=false;
  for(let i=0;i<_mlbls.length;i++){
    const it=_mlbls[i];
    if(it.target===undefined)continue;
    const diff=it.target-it.cur;
    if(Math.abs(diff)>0.4){
      it.cur+=diff*0.55;
      stillMoving=true;
    }else{
      it.cur=it.target;
    }
    const val=it.cur+"px";
    if(it.el.style.left!==val)it.el.style.left=val;
  }
  return stillMoving;
}
function updateMonthLabels(){ /* 外部からの呼び出し口(既存互換): 目標値の計算だけ行い、実際の描画はイージングループに任せる */
  updateMonthLabelTargets();
}
let _stickyLoopActive=false;
function stickyLoop(){
  const movingBars=updateStickyBlabels();
  const movingMonths=updateMonthLabelPositions();
  if(movingBars||movingMonths)requestAnimationFrame(stickyLoop);
  else _stickyLoopActive=false;
}
function scheduleStickyUpdate(){
  if(_stickyLoopActive)return;
  _stickyLoopActive=true;
  requestAnimationFrame(stickyLoop);
}

    }
    if(_hoverMid){
      e.preventDefault();
      data.milestones=data.milestones.filter(x=>x.id!==_hoverMid);
      _hoverMid=null;
      scheduleSave();render();
      return;
    }
    if(_hoverTid){
      e.preventDefault();
      data.tasks=data.tasks.filter(x=>x.id!==_hoverTid);
      _hoverTid=null;
      scheduleSave();render();
      return;
    }
    if(_hoverPhase){
      /* フェイズ「だけ」を削除する。配下タスクは削除せず、未分類(フェイズなし)として残す */
      e.preventDefault();
      const ph=_hoverPhase;
      data.phases=(data.phases||[]).filter(p=>p!==ph);
      data.tasks.forEach(t=>{if(t.phase===ph)t.phase="";});
      _hoverPhase=null;
      scheduleSave();render();
      return;
    }
    return;
  }
  const mod=e.ctrlKey||e.metaKey;
  if(!mod)return;
  if(typing)return;
  if(modalOpen)return;
  const k=e.key.toLowerCase();
  if(k==="z"&&!e.shiftKey){e.preventDefault();undo();}
  else if((k==="z"&&e.shiftKey)||k==="y"){e.preventDefault();redo();}
  else if(k==="d"){
    e.preventDefault();
    if(zoom==="fit")return;
    if(_hoverTid){
      const t=data.tasks.find(x=>x.id===_hoverTid);
      if(t)duplicateTask(t);
    }else if(_hoverPhase){
      /* フェイズ「だけ」を複製する。配下タスクは複製しない */
      const ph=_hoverPhase;
      let newName=`${ph} のコピー`,i=2;
      while(data.phases.includes(newName)){newName=`${ph} のコピー${i}`;i++;}
      const idx=data.phases.indexOf(ph);
      data.phases.splice(idx+1,0,newName);
      scheduleSave();render();
    }
  }
});
setupColResizers();
