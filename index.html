<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AA_GanttChartBoard</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='6' width='17' height='5.5' rx='2.75' fill='%232F6FBF'/%3E%3Crect x='4' y='13.25' width='24' height='5.5' rx='2.75' fill='%2355939F'/%3E%3Crect x='4' y='20.5' width='13' height='5.5' rx='2.75' fill='%23D23B30'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFFFFF;
  --panel:#FFFFFF;
  --text:#1A1D21;
  --muted:#878E98;
  --faint:#B4BAC2;
  --line:#E8EAED;
  --line2:#F3F4F6;
  --accent:#2F6FBF;
  --hover:#F7F8F9;
  --rowHov:rgba(20,29,40,.03);
  --dayNum:#6B7280;
  --satTxt:#5B8BC9;
  --sunTxt:#C9736A;
  --wkSat:rgba(47,111,191,.055);
  --wkSun:rgba(196,90,74,.055);
  --hovCol:rgba(47,111,191,.08);
  --mline:#C7CDD5;
  --phaseHov:#4B5157;
  --mband:rgba(20,29,40,.024);
  --todayCol:rgba(47,111,191,.065);
  --veil:rgba(255,255,255,.5);
  --imp:#D23B30;
  --impRgb:210,59,48;
  --imp2:#E9AF12;
  --imp2d:#A87B00;
  --stem:#C9CDD3;
  --lblBg:rgba(255,255,255,.92);
  --leftW:272px;
  --asgW:86px;
  --rowH:44px;
  --barH:26px;
  --avL:20px;
  --headH:58px;
}
body.dark{
  --bg:#0F1216;
  --panel:#14181E;
  --text:#E6EAEF;
  --muted:#8B93A0;
  --faint:#5A626E;
  --line:#272E38;
  --line2:#1E242C;
  --accent:#5B9BE6;
  --hover:#1B212A;
  --rowHov:rgba(255,255,255,.045);
  --dayNum:#98A2B0;
  --satTxt:#6FA3E0;
  --sunTxt:#D68A80;
  --wkSat:rgba(91,155,230,.09);
  --wkSun:rgba(214,106,94,.09);
  --hovCol:rgba(91,155,230,.12);
  --mline:#3B434F;
  --phaseHov:#9AA2AC;
  --mband:rgba(255,255,255,.035);
  --todayCol:rgba(91,155,230,.1);
  --veil:rgba(15,18,22,.5);
  --imp:#E2685E;
  --impRgb:226,104,94;
  --imp2:#D9A514;
  --imp2d:#E5C155;
  --stem:#454D58;
  --lblBg:rgba(20,24,30,.92);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:Inter,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic Medium","Yu Gothic",Meiryo,sans-serif;
  font-size:13px;display:flex;flex-direction:column;overflow:hidden;
  font-feature-settings:"tnum";
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:12px}
input,select{font-family:inherit;font-size:13px;color:var(--text);background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:6px 9px;outline:none}
input:focus,select:focus{border-color:var(--accent)}
button:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
/* テーマ切替: 月/太陽アイコン入りのトグルスイッチ(つまみを細長いカプセル型に) */
.themeToggle{
  position:relative;flex:none;width:56px;height:22px;border-radius:99px;
  background:var(--line2);border:1px solid var(--line);
  padding:0;margin:0;box-sizing:border-box;display:inline-block;vertical-align:middle;
  appearance:none;-webkit-appearance:none;-moz-appearance:none;
  line-height:normal;font:inherit;
}
.themeToggle:hover{border-color:#C9CDD3}
.themeToggle .ttIcon{
  position:absolute;top:50%;transform:translateY(-50%);font-size:11px;line-height:1;
  color:var(--text);transition:opacity .15s;z-index:1;
}
.themeToggle .ttIcon.sun{left:6px}
.themeToggle .ttIcon.moon{right:6px}
.themeToggle .ttKnob{
  position:absolute;top:50%;left:3px;width:24px;height:16px;border-radius:99px;
  background:var(--panel);box-shadow:0 1px 3px rgba(0,0,0,.3);
  transform:translateY(-50%);
  transition:transform .25s cubic-bezier(.4,0,.2,1);z-index:2;
}
body.dark .themeToggle{background:var(--hover)}
body.dark .themeToggle .ttKnob{transform:translateY(-50%) translateX(26px)}
body.dark .themeToggle .ttIcon.sun{opacity:.45}
.themeToggle .ttIcon.moon{opacity:.45}
body.dark .themeToggle .ttIcon.moon{opacity:1}
/* ダーク/ライト切替の瞬間だけ、色に関わるプロパティをまとめて滑らかにクロスフェード(transformは対象外にして、トグルのつまみ等のアニメーションを潰さない) */
body.themeSwitching,body.themeSwitching *{
  transition:background-color .4s cubic-bezier(.4,0,.2,1),color .4s cubic-bezier(.4,0,.2,1),
    border-color .4s cubic-bezier(.4,0,.2,1),box-shadow .4s cubic-bezier(.4,0,.2,1),fill .4s ease,
    transform .25s cubic-bezier(.4,0,.2,1) !important;
}
#btnTheme{position:relative;overflow:hidden}
body.themeSwitching #btnTheme::after{
  content:"";position:absolute;inset:0;border-radius:4px;
  background:radial-gradient(circle,rgba(255,255,255,.5) 0%,rgba(255,255,255,0) 70%);
  animation:themeFlash .45s ease-out;pointer-events:none;
}
@keyframes themeFlash{0%{opacity:1;transform:scale(.3)}100%{opacity:0;transform:scale(2.2)}}

/* ---------- title bar (header image + large overlaid title, click to edit) ---------- */
#titleBar{
  position:relative;width:100%;min-height:64px;overflow:hidden;
  background:var(--panel);border-bottom:1px solid var(--line);
}
#titleBar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
#titleBar.hasImg{min-height:176px}
#titleBar.hasImg img{display:block}
#titleOverlay{
  position:absolute;inset:0;display:none;
  background:linear-gradient(to top,rgba(0,0,0,.62) 0%,rgba(0,0,0,.15) 55%,rgba(0,0,0,0) 100%);
}
#titleBar.hasImg #titleOverlay{display:block}
#titleBtn{
  position:relative;z-index:1;display:block;width:100%;text-align:left;
  padding:14px 22px;cursor:pointer;
}
#titleBar.hasImg #titleBtn{position:absolute;left:0;bottom:0;padding:18px 22px 16px}
#titleText{
  font-size:26px;font-weight:700;letter-spacing:.01em;color:var(--text);
  line-height:1.25;max-width:80vw;
}
#titleBar.hasImg #titleText{color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.45)}
#titleBtn:hover #titleText{opacity:.82}
#titleBar.hasImg #titleBtn:hover #titleOverlay{background:linear-gradient(to top,rgba(0,0,0,.72) 0%,rgba(0,0,0,.2) 55%,rgba(0,0,0,0) 100%)}
#titleCountdown{
  position:absolute;top:14px;right:18px;z-index:2;
  padding:5px 13px;border-radius:99px;font-size:12px;font-weight:700;letter-spacing:.02em;
  background:var(--hover);color:var(--text);border:1px solid var(--line);cursor:pointer;
}
#titleCountdown:hover{background:var(--line2)}
#titleBar.hasImg #titleCountdown{
  background:rgba(0,0,0,.45);color:#fff;border:none;backdrop-filter:blur(2px);
  text-shadow:0 1px 3px rgba(0,0,0,.3);
}
#titleBar.hasImg #titleCountdown:hover{background:rgba(0,0,0,.6)}

/* ---------- toolbar ---------- */
header{
  display:flex;align-items:center;gap:14px;padding:9px 16px;
  border-bottom:1px solid var(--line);flex-wrap:wrap;background:var(--panel);
}
.tgroup{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:8px;background:var(--hover)}
.segLabel{font-size:10.5px;color:var(--faint);white-space:nowrap;margin-right:-2px}
.scaleStepper{display:flex;align-items:center;gap:2px;border:1px solid var(--line);border-radius:4px;overflow:hidden;background:var(--panel);transition:opacity .15s}
.scaleStepper.disabled{opacity:.4;pointer-events:none}
.scaleStepper button{padding:5px 8px;color:#4B5157;font-weight:700;line-height:1}
.scaleStepper button:hover{background:var(--hover)}
.scaleStepper button:disabled{color:var(--faint);cursor:default;background:none}
#scaleReset{border-left:1px solid var(--line);font-weight:400;font-size:15px;display:flex;align-items:center;justify-content:center;line-height:1}
#scaleLabel{font-size:11px;color:var(--muted);min-width:34px;text-align:center;font-feature-settings:"tnum"}
.spacer{flex:1}
.btn{padding:6px 11px;border-radius:4px;color:#4B5157}
.btn:hover{background:var(--line2);color:var(--text)}
.tgroup .btn:hover{background:#fff}
body.dark .tgroup .btn:hover{background:rgba(255,255,255,.06)}
.btn.solid{border:1px solid var(--line)}
.btn.solid:hover{border-color:#C9CDD3}
.btn.accent{background:var(--accent);color:#fff;font-weight:600;padding:6px 14px}
.btn.accent:hover{background:var(--accent);color:#fff;filter:brightness(1.12)}
#saveState{font-size:11px;color:var(--faint)}
#appNameSep{height:11px;margin:0}
#appName{font-size:11px;color:var(--faint);font-weight:700}
.seg{display:flex;border:1px solid var(--line);border-radius:4px;overflow:hidden;background:var(--panel)}
.seg button{padding:6px 10px;color:#4B5157}
.seg button:hover{background:var(--hover)}
.seg button.on{background:var(--text);color:var(--bg)}
/* 重要度2/3は選択時、実際のバーと同じ色(黄色/赤)にして見た目を一致させる。未選択時も薄く色をのぞかせる */
.seg button.impBtn2{color:#B8860B}
.seg button.impBtn2.on{background:var(--imp2);color:#332800}
.seg button.impBtn3{color:var(--imp)}
.seg button.impBtn3.on{background:var(--imp);color:#fff}
.seg button.fitBtn{border-left:1px solid var(--line);color:#B4574A}
.seg button.fitBtn:hover{background:rgba(180,87,74,.08)}
.seg button.fitBtn.on{background:#B4574A;color:#fff}
.sep{width:1px;height:18px;background:var(--line);margin:0 4px}

/* ---------- layout: fixed left pane + scrolling right pane ---------- */
#gantt{flex:1;display:flex;overflow:hidden;position:relative}
.todayJump{
  position:absolute;top:var(--headH);margin-top:6px;z-index:25;
  display:flex;align-items:center;justify-content:center;
  background:var(--imp);color:#fff;font-size:13px;font-weight:700;line-height:1;
  padding:4px 8px;border-radius:5px 5px 5px 0;
  box-shadow:0 2px 6px rgba(0,0,0,.25);
  opacity:0;pointer-events:none;transition:opacity .35s ease;
}
.todayJump.show{opacity:1;pointer-events:auto}
.todayJump:hover{filter:brightness(1.1)}
.todayJump.l{left:calc(var(--leftW) + 6px)}
.todayJump.r{right:6px;border-radius:5px 5px 0 5px}
.todayJump.l.show{animation:todayNudgeL 1.4s ease-in-out infinite}
.todayJump.r.show{animation:todayNudgeR 1.4s ease-in-out infinite}
@keyframes todayNudgeL{0%,100%{transform:translateX(0)}50%{transform:translateX(-4px)}}
@keyframes todayNudgeR{0%,100%{transform:translateX(0)}50%{transform:translateX(4px)}}

/* ---------- FAB(右下の＋ボタンから タスク/マイルストーン/フェイズ追加を出す) ---------- */
#fab{position:absolute;right:20px;bottom:20px;z-index:28;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
/* ツールバーの「出力」ドロップダウン(ボタン数を減らしてツールバーを圧縮するため) */
#exportGroup{position:relative}
#exportMenuPanel{
  position:absolute;top:100%;left:0;margin-top:4px;
  display:flex;flex-direction:column;gap:2px;padding:6px;
  background:var(--panel);border:1px solid var(--line);border-radius:8px;
  box-shadow:0 6px 16px rgba(20,29,40,.18);
  opacity:0;pointer-events:none;transform:translateY(-4px);
  transition:opacity .12s,transform .12s;z-index:50;min-width:130px;
}
#exportGroup.open #exportMenuPanel{
  opacity:1;pointer-events:auto;transform:translateY(0);
}
#exportMenuPanel .btn{justify-content:flex-start;text-align:left;width:100%;padding:6px 8px}
#fabMain{
  width:48px;height:48px;border-radius:99px;background:var(--text);color:var(--bg);
  font-size:24px;line-height:1;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.3);transition:transform .18s ease;flex:none;
}
#fabMain:hover{filter:brightness(1.15)}
#fab.open #fabMain{transform:rotate(45deg)}
#fabMenu{
  display:flex;flex-direction:column;align-items:flex-end;gap:8px;
  opacity:0;pointer-events:none;transform:translateY(8px);
  transition:opacity .16s ease,transform .16s ease;
}
#fab.open #fabMenu{opacity:1;pointer-events:auto;transform:translateY(0)}
.fabItem{
  background:var(--panel);color:var(--text);border:1px solid var(--line);
  padding:8px 14px;border-radius:99px;font-size:12px;font-weight:600;white-space:nowrap;
  box-shadow:0 3px 10px rgba(0,0,0,.18);
}
.fabItem:hover{background:var(--hover)}
body.fit #fab{display:none}
#lpane{
  width:var(--leftW);min-width:var(--leftW);position:relative;
  background:var(--panel);border-right:1px solid var(--line);z-index:10;
  zoom:var(--uiZoom,1);
}
#gantt.hscrolled #lpane{box-shadow:8px 0 10px -8px rgba(20,29,40,.15)}
#lhead{
  height:var(--headH);border-bottom:1px solid var(--line);
  display:flex;align-items:flex-end;padding:0 16px 8px;gap:10px;
  color:var(--faint);font-size:10px;letter-spacing:.1em;background:var(--panel);
  position:relative;z-index:2;
}
#lhead .hl1{flex:1}
#lhead .hl2{width:var(--asgW);flex:none}
#gantt.vscrolled #lhead,#gantt.vscrolled .rhead{box-shadow:0 8px 10px -8px rgba(20,29,40,.10)}
#lclip{position:absolute;top:var(--headH);bottom:0;left:0;right:0;overflow:hidden}
#lbody{will-change:transform;position:relative}

.colRes{position:absolute;width:9px;cursor:col-resize;z-index:20}
.colRes:hover{background:linear-gradient(to right,transparent 3px,var(--accent) 3px,var(--accent) 5px,transparent 5px);opacity:.5}
#resMain{top:0;bottom:0;right:-5px}
#resAsg{top:0;height:var(--headH);right:calc(11px + var(--asgW))}

#rpane{flex:1;overflow:auto;position:relative;zoom:var(--uiZoom,1)}
body.fit #rpane{overflow-x:hidden}
#rinner{position:relative;user-select:none}

/* ---------- right header (dates) ---------- */
.rhead{
  position:sticky;top:0;z-index:30;height:var(--headH);
  background:var(--panel);border-bottom:1px solid var(--line);
}
.hFill{position:absolute;top:0;height:100%;pointer-events:none}
.monthLbl{
  position:absolute;top:6px;font-size:11px;font-weight:600;color:var(--text);
  white-space:nowrap;height:16px;line-height:16px;padding-left:7px;
}
.mTick{position:absolute;top:0;bottom:0;width:1.5px;background:var(--mline)}
.dayCell{
  position:absolute;top:25px;height:28px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-size:10.5px;color:var(--dayNum);line-height:1;
}
.dayCell .wd{font-size:9px;color:var(--faint)}
.dayCell.sat,.dayCell.sat .wd{color:var(--satTxt)}
.dayCell.sun,.dayCell.sun .wd{color:var(--sunTxt)}
.dayCell.today,.dayCell.today .wd{color:var(--accent);font-weight:700}
/* 過去の日付ヘッダーも、バー/マイルストーンの過去フェードと合わせて薄くする */
.dayCell.pastDate{opacity:.45}
/* 本番日: 数字を太字にし、期間全体は下のeventDateBoxで1つの枠として囲む */
.dayCell.eventday div:first-child{font-weight:700;color:var(--imp)}
.dayCell.eventday .wd{font-weight:700;color:var(--imp)}
.eventDateBox{
  position:absolute;top:25px;height:28px;box-sizing:border-box;
  border:1.5px solid var(--imp);border-radius:4px;pointer-events:none;
}

/* ---------- rows (paired: .lrow in left pane / .rrow in right pane) ---------- */
.lrow{
  height:var(--rowH);display:flex;align-items:center;gap:10px;padding:0 16px;
  border-bottom:1px solid var(--line2);cursor:pointer;overflow:hidden;background:var(--panel);
  transition:opacity .5s ease,transform .12s,box-shadow .12s;
  user-select:none;
}
.rrow{position:relative;height:var(--rowH);border-bottom:1px solid var(--line2);transition:opacity .5s ease,transform .12s,box-shadow .12s}
.lrow.hov{background:var(--hover)}
.rrow.hov{background:var(--rowHov)}
.lrow[data-tid]{position:relative;padding-left:45px}
.lrow.ghost{padding-left:41px}
/* 階層線: フェイズの縦棒(x=32px)から続く縦のトランク(::before)と、中黒へつながる横の枝15px(::after) */
.lrow[data-tid]::before{
  content:"";position:absolute;left:31px;top:0;bottom:0;width:1px;background:var(--line);pointer-events:none;
}
.lrow[data-tid].lastInPhase::before{bottom:50%}
.lrow[data-tid]::after{
  content:"";position:absolute;left:31.5px;top:50%;
  width:15px;height:1px;
  background:var(--line);pointer-events:none;transform:translateY(-.5px);
}
/* フェイズに属さない(未分類の)タスクは、繋がる先のフェイズが無いので罫線を出さず中黒だけにする */
.lrow[data-tid].noPhase::before,.lrow[data-tid].noPhase::after{display:none}
/* フェイズをマウスオーバーした時、それ以外をゆっくりディゾルブして薄くする */
#gantt.phaseFocus .lrow,#gantt.phaseFocus .rrow{opacity:.3}
#gantt.phaseFocus .lrow.inFocus,#gantt.phaseFocus .rrow.inFocus{opacity:1}
/* フェイズ強調中、配下タスクの最後の行の下線を消して、ブロックとして繋がって見えるようにする */
.lrow.phaseEnd,.rrow.phaseEnd{border-bottom-color:transparent}

.tnameWrap{display:flex;align-items:center;gap:6px;flex:1;min-width:0;transition:transform .12s}
.tdot{flex:none;width:3px;height:3px;border-radius:99px;background:var(--faint)}

.taskName{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;font-size:12.5px;font-weight:600;transition:color .15s}
.catTag{
  flex:none;font-size:9.5px;color:var(--muted);border:1px solid var(--line);border-radius:4px;
  padding:1px 6px;max-width:84px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  display:inline-flex;align-items:center;gap:4px;transition:transform .12s,background .15s,color .15s,border-color .15s;
}
.catTag .cdot{width:6px;height:6px;border-radius:99px;flex:none}
.bcat{
  flex:none;display:inline-flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.85);color:#2A2E33;font-size:9px;font-weight:600;
  border-radius:3px;padding:0 5px;height:14px;max-width:90px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.bcat .cdot{width:5px;height:5px;border-radius:99px;flex:none}
.out .ocat{color:var(--faint);font-size:9.5px;margin-right:5px}
.mband{position:absolute;top:0;height:100%}
/* ドラッグ中: アクティブ以外を減光 */
#gantt.dragBars .bar,#gantt.dragBars .dia,#gantt.dragBars .diaLbl,#gantt.dragBars .diaStem{opacity:.3;transition:opacity .12s}
#gantt.dragBars .bar.activeDrag,#gantt.dragBars .dia.activeDrag,#gantt.dragBars .diaLbl.activeDrag,#gantt.dragBars .diaStem.activeDrag{opacity:1}
/* ドラッグ中は文字が選択されて気持ち悪くなるのを防ぐ(念のための一括対策) */
#gantt.dragBars,#gantt.dragRows,body.marqueeActive{user-select:none}
#gantt.dragRows .lrow,#gantt.dragRows .rrow{opacity:.4;transition:opacity .12s}
#gantt.dragRows .lrow.activeDrag,#gantt.dragRows .rrow.activeDrag{opacity:1}
.asg{width:var(--asgW);flex:none;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);overflow:hidden;transition:transform .12s,color .15s}
.avs{width:var(--avL);height:var(--avL);flex:none;display:flex;align-items:center;justify-content:center}
.avs img{width:100%;height:100%;border-radius:99px;object-fit:cover;display:block}
.asg .dot{width:9px;height:9px;border-radius:99px;flex:none}
.asg .dot.none{background:none;border:1px dashed var(--faint)}
/* .avs内の色丸(アイコン未設定時のフォールバック)は、画像アイコンと同じ大きさに揃える */
.avs .dot{width:100%;height:100%}
.asg .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.grip{
  flex:none;width:12px;margin-left:-6px;color:var(--faint);font-size:11px;
  cursor:grab;opacity:0;text-align:center;user-select:none;line-height:1;
  transition:transform .12s,color .12s,opacity .12s;
}
.lrow:hover .grip{opacity:1}
.grip:hover{color:var(--text)}
.grip:active{cursor:grabbing}
/* 左端(グリップ)ホバー時、タスクの行全体(左右両パネル)を丸ごと浮かせる */
.lrow[data-tid].blockLift,.rrow[data-tid].blockLift{
  transform:translateY(-2px);z-index:3;
}
body.fit .lrow[data-tid].blockLift,body.fit .rrow[data-tid].blockLift{transform:none}
/* タスク行の左端(インデント部分)全体を掴めるヒットエリアにし、一番左をホバーしただけでgrabカーソルが出るように */
.lrow[data-tid] .grip{
  position:absolute;left:0;top:0;bottom:0;width:38px;margin:0;
  display:flex;align-items:center;justify-content:center;
}
.dropInd{
  position:absolute;left:0;right:0;height:2px;background:var(--accent);
  z-index:40;pointer-events:none;display:none;
}

/* phase rows: 罫線・色ではなく「行の高さ(余白)」だけで区切りを作る。
   前置アイコン群は絶対配置の固定座標にして、タスク側の階層線と誤差なく揃える */
.lrow.phase{
  position:relative;cursor:pointer;font-size:12.5px;font-weight:700;letter-spacing:.05em;color:var(--text);
  padding-left:54px;transition:background .15s,color .15s,transform .12s,box-shadow .12s;
}
.lrow.phase .phToggle{
  position:absolute;left:2px;top:0;bottom:0;width:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--muted);transition:transform .15s;line-height:1;
}
.lrow.phase .phToggle:hover{color:var(--text)}
.lrow.phase.collapsed .phToggle{transform:translateY(-50%) rotate(-90deg);top:50%}
.lrow.phase .grip{
  position:absolute;left:16px;top:0;bottom:0;width:12px;margin:0;
  display:flex;align-items:center;justify-content:center;
}
.lrow.phase .pbar{
  position:absolute;left:30px;top:50%;transform:translateY(-50%);
  width:3px;height:14px;background:var(--text);border-radius:2px;
  transition:transform .12s,background .15s;
}
.rrow.phase{background:var(--panel);transition:background .15s,transform .12s,box-shadow .12s;cursor:grab}
/* フェイズ集計バー: 配下タスクの最小開始日〜最大終了日を示す細いバー。閉じていても表示される。
   始点は縦線、終点は矢印のように尖った形。フェイズ名の左右で線を分割し、文字の背後には何も敷かない
   (背景で隠す方式だと行がフェードする際に不自然になるため)。ドラッグの当たり判定だけは透明な1本の要素で全幅を覆う */
.phaseSummaryBar{
  position:absolute;top:50%;transform:translateY(-50%);height:14px;cursor:grab;
}
.phaseSummaryBar:active{cursor:grabbing}
body.fit .phaseSummaryBar{cursor:not-allowed}
.phaseSummarySeg{
  position:absolute;top:50%;transform:translateY(-50%);height:5px;
  background:var(--text);opacity:.4;pointer-events:none;
}
.phaseSummarySeg.arrow{
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 50%,calc(100% - 6px) 100%,0 100%);
}
.phaseSummaryBar.activeDrag~.phaseSummarySeg,.phaseSummarySeg.activeDrag{opacity:.7}
.phaseSummaryStart{
  position:absolute;top:50%;transform:translateY(-50%);width:1px;height:18px;
  background:var(--text);opacity:.3;pointer-events:none;
}
.phaseSummaryLabel{
  position:absolute;top:50%;transform:translateY(-50%);z-index:1;
  font-size:11px;font-weight:700;letter-spacing:.03em;color:var(--muted);
  white-space:nowrap;pointer-events:none;
}
.rrow.phase:active{cursor:grabbing}
/* グリップ/カレンダー部分をホバー・グラブしている間、フェイズ行全体(左右両パネル)を丸ごと浮かせる */
.lrow.phase.blockLift,.rrow.phase.blockLift{
  transform:translateY(-2px);z-index:3;
}
body.fit .lrow.phase.blockLift,body.fit .rrow.phase.blockLift{transform:none}
.taskGroupWrap{overflow:hidden;transition:max-height .15s ease}
/* フェイズブロックのホバー: 行全体を反転させるのではなく、通常のタスク行と同じ控えめな背景ハイライトにしつつ、
   薄いグレーだった集計バー・ラベルだけをはっきり濃く(黒く)して強調する */
.lrow.phase.hov{background:var(--hover)}
.rrow.phase.hov{background:var(--rowHov)}
.rrow.phase.hov .phaseSummarySeg{opacity:1}
.rrow.phase.hov .phaseSummaryStart{opacity:1}
.rrow.phase.hov .phaseSummaryLabel{color:var(--text)}
.lrow.phase.hov .pbar{background:var(--text)}

/* milestone row */
.lrow.ms{cursor:default;font-size:10px;letter-spacing:.16em;color:var(--muted);font-weight:600}
.dia{
  position:absolute;width:9px;height:9px;background:var(--text);
  transform:rotate(45deg);border-radius:1px;cursor:grab;z-index:5;
  transition:transform .12s,background .12s;
}
.dia:hover{background:var(--accent);transform:translateY(-2px) rotate(45deg);z-index:9}
.dia:active{cursor:grabbing}
.dia .h{
  position:absolute;top:50%;width:6px;height:14px;cursor:ew-resize;z-index:1;
  transform:translateY(-50%) rotate(-45deg); /* 親(diaの回転45deg)を打ち消して当たり判定を水平に保つ */
}
.dia .h.l{left:-6px}
.dia .h.r{right:-6px}
body.fit .dia .h{cursor:default}
/* 単発◆が端ドラッグで期間に伸びている最中の見た目(回転を解除してバンド風に) */
.dia.stretching{
  transform:none;height:18px;width:auto;border-radius:5px;
  box-shadow:0 0 0 1.5px var(--panel);
}
.dia.stretching .h{transform:translateY(-50%) rotate(0deg)}
.diaStem{position:absolute;width:1px;background:var(--stem);z-index:1;pointer-events:none}
.msband{
  position:absolute;height:18px;background:var(--text);border-radius:5px;
  cursor:grab;z-index:5;display:flex;align-items:center;gap:6px;padding:0 8px;
  color:var(--bg);white-space:nowrap;overflow:hidden;
  box-shadow:0 0 0 1.5px var(--panel); /* 同列に並んだバンド同士の切れ目 */
  transition:transform .12s,filter .12s,box-shadow .12s;
}
.msband .mbwrap{
  display:flex;align-items:center;gap:6px;
  max-width:calc(100% - 16px);overflow:hidden;will-change:transform;
}
.msband .mbl{font-size:10px;font-weight:700;white-space:nowrap}
.msband .mbd{font-size:9px;opacity:.7;white-space:nowrap}
.msband:hover{filter:brightness(1.15);transform:translateY(-2px);box-shadow:0 0 0 1.5px var(--panel),0 3px 8px rgba(20,29,40,.28);z-index:9}
.msband:active{cursor:grabbing}
.msband .h{position:absolute;top:0;width:8px;height:100%;cursor:ew-resize;z-index:1}
.msband .h.l{left:-2px}
.msband .h.r{right:-2px}
body.fit .msband{cursor:not-allowed}
body.fit .msband:hover{transform:none;filter:none;box-shadow:0 0 0 1.5px var(--panel)}
body.fit .msband .h{cursor:default}
/* 重要度: 3=赤色 / 2=黄色 */
.dia.imp3,.msband.imp3{background:var(--imp);color:#fff}
.dia.imp2,.msband.imp2{background:var(--imp2);color:#332800}
.diaLbl.imp3 b{color:var(--imp)}
.diaLbl.imp2 b{color:var(--imp2d)}
.diaLbl{
  position:absolute;font-size:10.5px;white-space:nowrap;pointer-events:none;line-height:14px;
  background:var(--lblBg);padding:0 3px;border-radius:3px;z-index:2;
}
.diaLbl b{font-weight:600;color:var(--text)}
.diaLbl span{color:var(--muted);font-size:9.5px;margin-left:4px}

/* bars */
.bar{
  position:absolute;top:calc((var(--rowH) - var(--barH))/2);height:var(--barH);
  border-radius:5px;z-index:2;
  display:flex;align-items:center;padding:0 8px;font-size:11px;color:#fff;
  cursor:grab;user-select:none;white-space:nowrap;
  box-shadow:0 1px 2px rgba(20,29,40,.15);
  transition:box-shadow .12s,transform .12s;
}
.bar:hover{box-shadow:0 4px 10px rgba(20,29,40,.32);transform:translateY(-2px);z-index:9}
/* Shift+クリックで複数選択したバー */
.bar.selected{box-shadow:0 0 0 2px var(--accent),0 2px 6px rgba(20,29,40,.25);z-index:4}
/* 移動ドラッグ中、元の位置に残す薄いグレーのゴースト */
.bar.dragGhost{
  background:var(--faint)!important;opacity:.35;box-shadow:none;
  pointer-events:none;z-index:1;
}
.bar.dragGhost *{visibility:hidden}
/* フェイズの集計バー自体のゴースト(通常の.phaseSummarySegより一段薄く) */
/* フェイズの集計バー自体のゴースト(通常の.phaseSummarySegより一段薄く)。
   ホバー時の反転ルール(.rrow.phase.hov .phaseSummarySeg{opacity:1})より詳細度を上げて確実に薄いままにする */
.phaseSummarySeg.dragGhostPhase{opacity:.18;pointer-events:none}
.rrow.phase.hov .phaseSummarySeg.dragGhostPhase{opacity:.18;background:var(--text)}
.phaseSummaryStart.dragGhostPhase{opacity:.15;pointer-events:none}
.rrow.phase.hov .phaseSummaryStart.dragGhostPhase{opacity:.15;background:var(--text)}
.bar.selected:hover{box-shadow:0 0 0 2px var(--accent),0 4px 10px rgba(20,29,40,.32)}
/* バーが画面外でも分かるよう、左側のタスク名の行にも選択中であることを示す */
.lrow[data-tid].selected{box-shadow:inset 3px 0 0 var(--accent);background:rgba(47,111,191,.07)}
/* ドラッグ矩形選択で複数選択したマイルストーン */
.dia.selected{box-shadow:0 0 0 2px var(--accent);z-index:6}
.msband.selected{box-shadow:0 0 0 2px var(--accent),0 0 0 1.5px var(--panel);z-index:6}
/* ドラッグ矩形選択で複数選択したフェイズ */
.lrow.phase.selected{box-shadow:inset 3px 0 0 var(--accent);background:rgba(47,111,191,.07)}
.rrow.phase.selected{box-shadow:inset 0 0 0 2px var(--accent)}
/* 空いている場所をドラッグしたときの矩形選択(マーキー) */
#marqueeBox{
  position:fixed;z-index:200;display:none;
  border:1px solid var(--accent);background:rgba(47,111,191,.12);pointer-events:none;
}
/* ドラッグ中だけ表示される、バー左右外側の日付ラベル */
.dragEdgeLbl{
  position:absolute;display:flex;align-items:center;
  background:#1A1D21;color:#fff;font-size:10px;font-weight:700;
  padding:0 6px;border-radius:4px;white-space:nowrap;pointer-events:none;z-index:12;
  box-shadow:0 2px 6px rgba(0,0,0,.28);
}
.dragEdgeLbl.tb{top:calc((var(--rowH) - var(--barH))/2);height:var(--barH)}
.dragEdgeLbl.ms{height:16px}
.dragEdgeLbl.s{transform:translateX(-100%)}
.dragEdgeLbl.c{transform:translateX(-50%)}
.bar.impB{z-index:3;font-weight:700}
.barPastVeil{position:absolute;top:0;left:0;height:100%;background:var(--veil);pointer-events:none;border-radius:5px 0 0 5px}
.dia.past,.msband.past{opacity:.55}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  border:1px solid var(--line);border-radius:99px;padding:3px 10px;font-size:11.5px;
  cursor:pointer;display:inline-flex;align-items:center;gap:6px;user-select:none;color:var(--muted);
}
.chip .cdot{width:7px;height:7px;border-radius:99px;flex:none}
.chip .chipIcon{width:16px;height:16px;border-radius:99px;flex:none;object-fit:cover}
.chip.on{border-color:var(--accent);background:rgba(47,111,191,.09);color:var(--text)}
.avstack{display:flex;flex:none;align-items:center}
.avstack .avs{margin-left:-5px}
.avstack .avs:first-child{margin-left:0}
.avstack .avs img{box-shadow:0 0 0 1.5px rgba(255,255,255,.9)}
.avstack .avs .dot:not(.none){box-shadow:0 0 0 1.5px rgba(255,255,255,.9)}
.asg .more{font-size:9.5px;color:var(--faint);margin-left:2px;flex:none}
.chk{display:flex;align-items:center;gap:8px;font-size:12.5px;cursor:pointer;color:var(--text);line-height:1}
.chk span{line-height:1;display:inline-block}
/* ネイティブのチェックボックスは環境によって縦位置がブレやすいため、見た目を完全に自前でスタイリングする */
.chk input[type=checkbox]{
  appearance:none;-webkit-appearance:none;
  width:14px!important;height:14px!important;flex:none;margin:0;padding:0!important;
  border:1.5px solid var(--line);border-radius:3px;
  background:var(--panel);cursor:pointer;position:relative;
  transition:background .12s,border-color .12s;
}
.chk input[type=checkbox]:checked{background:var(--accent);border-color:var(--accent)}
.chk input[type=checkbox]:checked::after{
  content:"";position:absolute;left:3.5px;top:1px;
  width:4px;height:7px;border:solid #fff;border-width:0 2px 2px 0;
  transform:rotate(45deg);
}
.bar:active{cursor:grabbing}
.bar .h{position:absolute;top:0;width:8px;height:100%;cursor:ew-resize}
.bar .h.l{left:-2px}.bar .h.r{right:-2px}
.bar .blabel{
  position:relative;left:6px;display:flex;align-items:center;gap:5px;
  max-width:calc(100% - 12px);overflow:hidden;padding:2px;z-index:2;
  will-change:transform;
}
.bar .lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:none}
.bavstack{display:flex;align-items:center;flex:none}
.bavstack img{
  width:calc(var(--barH) - 8px);height:calc(var(--barH) - 8px);border-radius:99px;
  object-fit:cover;box-shadow:0 0 0 1.5px rgba(255,255,255,.85);flex:none;display:block;
}
/* アイコン画像が未設定のメンバーは、画像の代わりに色丸(メンバーカラー)を同じ大きさで表示する */
.bavstack .cdot{
  width:calc(var(--barH) - 8px);height:calc(var(--barH) - 8px);border-radius:99px;
  box-shadow:0 0 0 1.5px rgba(255,255,255,.85);flex:none;display:block;
}
.bavstack img:not(:first-child),.bavstack .cdot:not(:first-child){margin-left:-6px}
.bar .out{
  position:absolute;left:calc(100% + 7px);top:0;height:100%;
  display:flex;align-items:center;font-size:10px;color:var(--muted);
  font-weight:400;pointer-events:none;white-space:nowrap;
}
.bar .out.flip{left:auto;right:calc(100% + 7px)}
.bar .out .on{color:var(--text);font-weight:600;font-size:10.5px;margin-right:5px}
/* 広いバー: 普段から左端に開始日・右端に終了日を薄く表示 */
.bar .edgeDate{
  position:absolute;top:0;height:100%;
  display:flex;align-items:center;font-size:10px;color:var(--muted);
  font-weight:400;pointer-events:none;white-space:nowrap;
}
.bar .edgeDate.l{right:calc(100% + 7px)}
.bar .edgeDate.r{left:calc(100% + 7px)}
.dayChip{
  display:inline-flex;align-items:center;gap:4px;margin-left:5px;padding:0 7px;border-radius:99px;
  background:var(--hover);border:1px solid var(--line);font-size:9px;color:var(--muted);
}
.dragEdgeLbl .dayChip{background:rgba(255,255,255,.18);border-color:transparent;color:#fff}
.bar.activeDrag .edgeDate{visibility:hidden}
body.fit .bar,body.fit .dia{cursor:not-allowed}
body.fit .grip{cursor:not-allowed}
body.fit .rrow.phase{cursor:not-allowed}
body.fit .bar .h{cursor:not-allowed}
body.fit .lrow[data-tid],body.fit .lrow.phase,body.fit .lrow.ghost{cursor:not-allowed}
/* バーの無い空欄部分(行の余白・マイルストーンレーン・背景)にも同じくnot-allowedを出す */
body.fit .rrow[data-tid],body.fit .rrow.ms,body.fit #rinner{cursor:not-allowed}
body.fit .rowAdd{cursor:not-allowed;pointer-events:none}
body.fit .phToggle{cursor:pointer}
body.fit .bar:hover{transform:none;box-shadow:0 1px 2px rgba(20,29,40,.15)}
body.fit .dia:hover{transform:rotate(45deg)}

/* background / overlay layers */
#bglayer{position:absolute;top:0;left:0;z-index:0;pointer-events:none}
.bgfill{position:absolute;top:0;height:100%}
.wsat{background:var(--wkSat)}
.wsun{background:var(--wkSun)}
#overlay{position:absolute;top:0;left:0;pointer-events:none;z-index:6}
#hoverCol{position:absolute;top:0;pointer-events:none;z-index:1;background:var(--hovCol);display:none}
#hoverDate{
  position:absolute;top:37px;transform:translateX(-50%);
  background:var(--text);color:var(--bg);font-size:9.5px;font-weight:600;
  padding:1.5px 7px;border-radius:99px;pointer-events:none;display:none;
  white-space:nowrap;z-index:5;
}
.vline{position:absolute;top:0;width:1px;height:100%}
.vline.today{background:var(--imp);opacity:1;width:2px;z-index:2}
.todayBand{position:absolute;top:0;height:100%;background:var(--todayCol);pointer-events:none}
/* 本番日の列: TODAYの帯と同じ考え方で、期間全体に薄い赤系(--impRgb)の帯を敷いて目立たせる。
   フェイズ行の不透明な白背景(z-index:auto)より上、タスクバー(z-index:2)より下に表示するためz-index:1の独立レイヤーにする */
.eventBand{position:absolute;top:0;height:100%;background:rgba(var(--impRgb),.16);pointer-events:none;z-index:1}
.todayFlag{
  position:absolute;bottom:-1px;transform:translateX(-50%);z-index:8;
  background:var(--imp);color:#fff;font-size:9.5px;font-weight:700;letter-spacing:.03em;
  padding:2px 8px 2px 7px;border-radius:5px 5px 5px 0;white-space:nowrap;pointer-events:none;
  animation:todayRing 2s ease-out infinite;
}
/* 赤い波紋がふわっと広がって消える */
@keyframes todayRing{
  0%{box-shadow:0 2px 5px rgba(0,0,0,.22),0 0 0 0 rgba(var(--impRgb),.55)}
  70%{box-shadow:0 2px 5px rgba(0,0,0,.22),0 0 0 8px rgba(var(--impRgb),0)}
  100%{box-shadow:0 2px 5px rgba(0,0,0,.22),0 0 0 0 rgba(var(--impRgb),0)}
}
.vline.monthEdge{background:var(--mline)}
.vline.msline{border-left:1px dashed var(--stem)}


footer{padding:6px 16px;border-top:1px solid var(--line);color:var(--faint);font-size:11px;display:flex;gap:18px;flex-wrap:wrap;background:var(--panel);align-items:center}
#shortcutsBtn{font-size:11px;color:var(--faint);padding:2px 6px;border-radius:4px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#shortcutsBtn:hover{background:var(--hover);color:var(--muted)}
.shortcutGrid{display:flex;flex-direction:column;max-height:60vh;overflow-y:auto;padding-right:4px}
.scSection{font-size:12px;font-weight:700;color:var(--text);margin:16px 0 4px;padding-bottom:5px;border-bottom:1px solid var(--line)}
.scSection:first-child{margin-top:0}
.scRow{display:grid;grid-template-columns:190px 1fr;gap:12px;padding:5px 0;font-size:12px;color:var(--muted);line-height:1.5}
.scKey{font-weight:600;color:var(--text);white-space:nowrap}

/* ---------- modal ---------- */
#modalBg{position:fixed;inset:0;background:rgba(20,22,26,.35);display:none;align-items:center;justify-content:center;z-index:100}
#modalBg.show{display:flex}
.modal{background:var(--panel);border-radius:10px;padding:22px;width:min(440px,92vw);max-height:85vh;overflow:auto;box-shadow:0 10px 40px rgba(0,0,0,.12)}
.modal.wide{width:min(560px,94vw)}
.modal h2{font-size:14px;margin-bottom:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px}
/* .fieldの子でも.chkラベル(チェックボックス行)はflex横並びを維持する(上のdisplay:blockに詳細度で負けないように) */
.field label.chk{display:flex;margin-bottom:0}
.field input,.field select{width:100%}
.field label.chk input[type=checkbox]{width:14px;height:14px}
.mRow{display:flex;gap:10px}
.mRow .field{flex:1;min-width:0}
.mFoot{display:flex;gap:8px;margin-top:16px}
.mFoot .spacer{flex:1}
.btn.primary{background:var(--text);color:var(--bg)}
.btn.primary:hover{opacity:.85;color:var(--bg)}
.btn.danger{color:#B4574A}
.btn.danger:hover{background:#FBF0EE;color:#B4574A}

.memList{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.memItem{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:6px;padding:8px 10px;flex-wrap:wrap}
.memItem .dot{width:16px;height:16px;border-radius:99px;flex:none;cursor:pointer;border:1px solid rgba(0,0,0,.08)}
#fMemColorDot{width:22px;height:22px;border-radius:99px;flex:none;cursor:pointer;border:1px solid rgba(0,0,0,.08)}
.memItem span{flex:1}
.memItem button{color:var(--faint)}
.memItem button:hover{color:#B4574A}
.mAv{
  width:30px;height:30px;border-radius:99px;flex:none;overflow:hidden;cursor:pointer;
  background:var(--hover);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);
}
.mAv img{width:100%;height:100%;object-fit:cover;display:block}
.mAv:hover{border-color:var(--accent)}
.mini{font-size:10.5px;border:1px solid var(--line);border-radius:4px;padding:2px 7px;color:var(--muted)!important;flex:none}
.mini:hover{color:#B4574A!important;border-color:#B4574A}
.palRow{display:flex;gap:7px;align-items:center;width:100%;padding:8px 2px 2px;flex-wrap:wrap}
.sw{width:19px;height:19px;border-radius:99px;cursor:pointer;border:2px solid transparent}
.sw:hover{transform:scale(1.15)}
.sw.on{border-color:var(--text)}
.palRow input[type=color]{width:28px;height:23px;padding:1px;border:1px solid var(--line);border-radius:4px;background:none;cursor:pointer}
.palRow .plbl{font-size:10.5px;color:var(--faint)}

#txtOut{
  width:100%;height:320px;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  font-size:12px;line-height:1.7;border:1px solid var(--line);border-radius:6px;padding:12px;
  white-space:pre;overflow:auto;resize:vertical;color:var(--text);background:var(--panel);
}

/* ---------- popover (クリック位置の近くに出る小窓) ---------- */
#popover{
  position:fixed;z-index:120;width:274px;
  background:var(--panel);border:1px solid var(--line);border-radius:10px;
  box-shadow:0 8px 30px rgba(0,0,0,.2);padding:14px;
}
#popover h3{font-size:12.5px;margin-bottom:10px;color:var(--text)}
#popover .field{margin-bottom:9px}
#popover .hint{font-size:10.5px;color:var(--faint);margin-top:6px}

/* 行内の＋ボタンとゴースト追加行 */
.rowAdd{
  flex:none;width:20px;height:20px;border-radius:5px;border:1px solid var(--line);
  color:var(--muted);opacity:0;font-size:13px;line-height:1;margin-left:auto;
}
.lrow:hover .rowAdd{opacity:1}
.rowAdd:hover{color:var(--accent);border-color:var(--accent)}
.lrow.phase .pname{flex:1}
.lrow.ghost{color:var(--faint);font-size:12px;cursor:pointer}
.lrow.ghost:hover{color:var(--accent)}

/* ---------- PNG capture (全体表示を丸ごと展開してラスタライズ) ---------- */
/* flex:1のままだとビューポートの余った縦幅まで伸びてしまい、PNG出力時に最後のタスクより下へ無駄な余白が写り込むため、
   キャプチャ中はflexを外して内容量ぴったりの高さにする */
#gantt.pngCap{height:auto!important;flex:none!important;padding-bottom:20px}
#gantt.pngCap #lpane,#gantt.pngCap #lclip,#gantt.pngCap #rpane{
  height:auto!important;overflow:visible!important;
}
#gantt.pngCap #lbody{transform:none!important}
#gantt.pngCap .colRes,#gantt.pngCap #hoverCol,#gantt.pngCap #hoverDate,#gantt.pngCap .rowAdd{display:none!important}
#gantt.pngCap .grip{opacity:0!important}

/* ---------- print (日付範囲でヨコ方向に複数ページへ自然分割する) ---------- */
#printPages{display:none}
.printPage{display:flex;align-items:flex-start;page-break-after:always;break-after:page}
.printPage:last-child{page-break-after:auto;break-after:auto}
.printPageLeft{flex:none;position:relative}
.printPageWin{overflow:hidden;position:relative;border-left:1px solid var(--line)}
@media print{
  @page{size:landscape;margin:8mm}
  body>*{display:none!important}
  body>#printPages{display:block!important}
  /* ブラウザは印刷時にデフォルトで背景色を省略するため、明示的に印刷させる */
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
}
</style>
