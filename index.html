<script>
const $=s=>document.querySelector(s);
const uid=()=>Math.random().toString(36).slice(2,9);
const DAY=86400000;
const PALETTE=["#3B76C4","#4C9E7E","#9A6BC4","#C46B8A","#C4854C","#4C9EB8","#8AA044","#7A7F8A","#55939F"];
/* 「藍上アオイ」または「アオイ」という名前で登録された場合は、専用のブランドカラーを自動で割り当てる */
function resolveMemberColor(name,fallback){
  return(name==="藍上アオイ"||name==="アオイ")?"#55939F":fallback;
}

let data=null;
let zoom="20";      // "12" | "20" | "30" | "fit"
let uiScale=1;       // ガントチャート全体の表示倍率(0.7〜1.5)。CSSのzoomと連動
let selectedTaskIds=new Set(); // Shift+クリックで複数選択したタスクのID
let selectedMsIds=new Set(); // ドラッグ矩形選択で複数選択したマイルストーンのID
let selectedPhases=new Set(); // ドラッグ矩形選択で複数選択したフェイズ名
let _marqueeJustSelected=false; // マーキー選択直後のclickで解除されないようにするフラグ
let _barReg={};       // taskId -> {bar,t} の一覧。複数選択時のグループ移動で使う
let dayW=30;
let _mlbls=[];      // 月ラベルのスクロール追従用 {el,x0,x1}
let _rs=null;       // 現在の描画状態(ホバー列表示用) {r,nDays,dayW,tW}

const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const parse=s=>new Date(s+"T00:00:00");
const addD=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x};
const today=()=>parse(fmt(new Date()));
const dfmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
const yfmt=d=>`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
const WD=["日","月","火","水","木","金","土"];

/* ---------- 日本の祝日(内閣府の規定に準拠。現行ルール基準で2000年以降を想定) ---------- */
/* 春分の日・秋分の日は天文計算が必要なため、広く使われている近似式(1980〜2099年に有効)で算出する */
function vernalEquinoxDay(y){return Math.floor(20.8431+0.242194*(y-1980)-Math.floor((y-1980)/4));}
function autumnalEquinoxDay(y){return Math.floor(23.2488+0.242194*(y-1980)-Math.floor((y-1980)/4));}
/* 月内の第n○曜日(ハッピーマンデー制度)の日付を求める。month:1-12, weekday:0(日)〜6(土) */
function nthWeekdayOfMonth(y,month,weekday,n){
  const first=new Date(y,month-1,1);
  const offset=(weekday-first.getDay()+7)%7;
  return 1+offset+(n-1)*7;
}
const _holidayCache={};
function buildJpHolidays(y){
  const h={};
  const add=(m,d,name)=>{if(d)h[`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`]=name;};
  add(1,1,"元日");
  add(1,nthWeekdayOfMonth(y,1,1,2),"成人の日");
  if(y>=1967)add(2,11,"建国記念の日");
  if(y>=2020)add(2,23,"天皇誕生日");
  add(3,vernalEquinoxDay(y),"春分の日");
  if(y>=2007)add(4,29,"昭和の日");
  add(5,3,"憲法記念日");
  if(y>=2007)add(5,4,"みどりの日");
  add(5,5,"こどもの日");
  if(y>=2003)add(7,nthWeekdayOfMonth(y,7,1,3),"海の日");
  else if(y>=1996)add(7,20,"海の日");
  if(y>=2016)add(8,11,"山の日");
  if(y>=2003)add(9,nthWeekdayOfMonth(y,9,1,3),"敬老の日");
  add(9,autumnalEquinoxDay(y),"秋分の日");
  if(y>=2000)add(10,nthWeekdayOfMonth(y,10,1,2),y>=2020?"スポーツの日":"体育の日");
  add(11,3,"文化の日");
  add(11,23,"勤労感謝の日");
  /* 振替休日: 祝日が日曜と重なった場合、翌日以降の最初の非祝日を休日にする */
  for(const dstr of Object.keys(h).sort()){
    const d=new Date(dstr+"T00:00:00");
    if(d.getDay()!==0)continue;
    let sub=addD(d,1);
    while(h[fmt(sub)])sub=addD(sub,1);
    h[fmt(sub)]="振替休日";
  }
  /* 国民の休日: 祝日と祝日に挟まれた平日(日曜を除く)を休日にする(例: シルバーウィーク) */
  for(const dstr of Object.keys(h).sort()){
    const d=new Date(dstr+"T00:00:00");
    const between=addD(d,1),next=addD(d,2);
    if(h[fmt(next)]&&!h[fmt(between)]&&between.getDay()!==0)h[fmt(between)]="国民の休日";
  }
  return h;
}
function jpHolidaysOfYear(y){
  if(!_holidayCache[y])_holidayCache[y]=buildJpHolidays(y);
  return _holidayCache[y];
}
/* dateStrの祝日名(祝日でなければundefined) */
function jpHolidayName(dateStr){return jpHolidaysOfYear(+dateStr.slice(0,4))[dateStr];}
/* 「いつ時点のガントチャートか」を示す共通の日時スタンプ(画面表示・テキスト出力・PNG出力で使う) */
function nowStamp(){
  const d=new Date();
  const hh=String(d.getHours()).padStart(2,"0"),mi=String(d.getMinutes()).padStart(2,"0");
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}(${WD[d.getDay()]}) ${hh}:${mi}`;
}
const dwd=d=>`${dfmt(d)}(${WD[d.getDay()]})`;
const ywd=d=>`${yfmt(d)}(${WD[d.getDay()]})`;
const _mctx=document.createElement("canvas").getContext("2d");
const FS='Inter,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic Medium",Meiryo,sans-serif';
function tw(t,f){_mctx.font=f;return _mctx.measureText(t).width;}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
/* ドラッグ中はカーソルをbody全体に固定し、高速に動かしても他要素のカーソルに化けないようにする */
function lockCursor(type){document.body.style.cursor=type;document.body.style.userSelect="none";}
function unlockCursor(){document.body.style.cursor="";document.body.style.userSelect="";}
function member(id){return data.members.find(m=>m.id===id)}
function membersOf(t){return (t.memberIds||[]).map(id=>member(id)).filter(Boolean)}
function catsOf(t){return (t.catIds||[]).map(id=>data.cats.find(c=>c.id===id)).filter(Boolean)}
function cloneTask(t){return {...t,id:uid(),memberIds:[...(t.memberIds||[])],catIds:[...(t.catIds||[])]}}
function ensureCat(name){
  name=name.trim();
  if(!name)return "";
  let c=data.cats.find(x=>x.name===name);
  if(!c){c={id:uid(),name,color:PALETTE[data.cats.length%PALETTE.length]};data.cats.push(c);}
  return c.id;
}
/* フェイズが1つも無い状態で、フェイズ未指定のままタスクを作ろうとした場合だけ、
   自動で「名称未設定」フェイズを1つ作ってそこに配置する(既にフェイズがある場合は何もしない=空欄のままでよい) */
function resolveTaskPhase(requested){
  if(requested)return requested;
  if(!data.phases)data.phases=[];
  if(data.phases.length===0)data.phases.push("名称未設定");
  return data.phases[0]||"";
}

/* TODAYが画面外にスクロールされている場合、矢印を出してワンクリックで戻れるようにする */
function updateTodayJump(){
  const jl=$("#todayJumpL"),jr=$("#todayJumpR");
  if(!jl||!jr)return;
  if(!_rs||zoom==="fit"||data.ui?.showToday===false){jl.classList.remove("show");jr.classList.remove("show");return;}
  const ti=dayIdx(_rs.r,fmt(today()));
  if(ti<0||ti>=_rs.nDays){jl.classList.remove("show");jr.classList.remove("show");return;}
  const todayX=ti*_rs.dayW+_rs.dayW/2;
  const rp=$("#rpane");
  const vLeft=rp.scrollLeft,vRight=vLeft+rp.clientWidth;
  if(todayX<vLeft-2){jl.classList.add("show");jr.classList.remove("show");}
  else if(todayX>vRight+2){jl.classList.remove("show");jr.classList.add("show");}
  else{jl.classList.remove("show");jr.classList.remove("show");}
}
function jumpToToday(){
  if(!_rs)return;
  const ti=dayIdx(_rs.r,fmt(today()));
  if(ti<0||ti>=_rs.nDays)return;
  const todayX=ti*_rs.dayW+_rs.dayW/2;
  const rp=$("#rpane");
  const target=Math.max(0,Math.min(todayX-rp.clientWidth/2,rp.scrollWidth-rp.clientWidth));
  rp.scrollTo({left:target,behavior:"smooth"});
}
$("#todayJumpL").addEventListener("click",jumpToToday);
$("#todayJumpR").addEventListener("click",jumpToToday);

function updateMonthLabels(){
  const s=$("#rpane").scrollLeft;
  /* 今どの月が左端に来ているか(=追従中のラベル)を特定し、その月にだけ西暦を付与する。
     元々西暦付き(先頭月・1月)はスクロールに関わらず常に表示。 */
  let activeIdx=-1;
  for(let i=0;i<_mlbls.length;i++){
    const it=_mlbls[i];
    if(s+2>=it.x0&&s+2<it.x1){activeIdx=i;break;}
  }
  for(let i=0;i<_mlbls.length;i++){
    const it=_mlbls[i];
    const showYear=it.origHasYear||i===activeIdx;
    const text=showYear?`${it.y}年${it.mo}月`:`${it.mo}月`;
    if(it.el.textContent!==text)it.el.textContent=text;
    const w=it.el.offsetWidth;
    const x=Math.min(Math.max(it.x0,s+2),Math.max(it.x1-w-2,it.x0));
    it.el.style.left=x+"px";
  }
}

/* ---------- storage & history ---------- */
/* 保存先を二重化: window.storage(メイン) + localStorage(フォールバック/即時避難先) */
const STORE_KEY="aa-ganttchartboard:data";
/* 旧ファイル名(migiri_schedule.html)時代に使っていた保存キー。新キーに何も無い場合だけ読み出し、
   見つかったらそのまま新キーへコピーして以後は使わない(既存データを消さないための一度きりの移行措置) */
const LEGACY_STORE_KEY="migiri-gantt:data";
const store={
  async get(){
    let v=null;
    if(window.storage){
      try{const r=await window.storage.get(STORE_KEY);v=r?.value??null;}catch(e){}
    }
    if(v==null){
      try{v=localStorage.getItem(STORE_KEY);}catch(e){}
    }
    if(v==null){
      let legacy=null;
      if(window.storage){
        try{const r=await window.storage.get(LEGACY_STORE_KEY);legacy=r?.value??null;}catch(e){}
      }
      if(legacy==null){
        try{legacy=localStorage.getItem(LEGACY_STORE_KEY);}catch(e){}
      }
      if(legacy!=null){
        v=legacy;
        await this.set(v); /* 新キーへ移行して保存し直す */
      }
    }
    return v;
  },
  async set(v){
    let ok=false;
    try{localStorage.setItem(STORE_KEY,v);ok=true;}catch(e){}
    if(window.storage){
      try{await window.storage.set(STORE_KEY,v);ok=true;}catch(e){}
    }
    return ok;
  },
  /* タブを閉じる直前用: 同期的に書けるlocalStorageへ即時退避+非同期保存も発火 */
  flush(v){
    try{localStorage.setItem(STORE_KEY,v);}catch(e){}
    if(window.storage){try{window.storage.set(STORE_KEY,v);}catch(e){}}
  }
};
let saveTimer=null;
let _hist=[],_redo=[],_histLock=false,_hoverTid=null,_hoverMid=null,_hoverPhase=null;
function snapshot(){
  const s=JSON.stringify(data);
  if(_hist[_hist.length-1]!==s){
    _hist.push(s);
    if(_hist.length>60)_hist.shift();
    _redo.length=0;
  }
}
function nowHM(){const d=new Date();return `${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}`}
function persist(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    saveTimer=null;
    const ok=await store.set(JSON.stringify(data));
    $("#saveState").textContent=ok?`自動保存済み ${nowHM()}`:"保存失敗";
  },300);
}
function flushSave(){
  if(!data)return;
  clearTimeout(saveTimer);saveTimer=null;
  store.flush(JSON.stringify(data));
}
/* タブを閉じる/隠す/フォーカスを失う瞬間に未保存分を即時書き込み */
window.addEventListener("beforeunload",flushSave);
window.addEventListener("pagehide",flushSave);
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="hidden")flushSave();});
window.addEventListener("blur",flushSave);
function scheduleSave(){
  $("#saveState").textContent="…";
  if(!_histLock)snapshot();
  persist();
}
function undo(){
  if(_hist.length<2)return;
  _redo.push(_hist.pop());
  data=JSON.parse(_hist[_hist.length-1]);
  _histLock=true;scheduleSave();_histLock=false;
  applyTheme();applyUiScale();render();
}
function redo(){
  if(!_redo.length)return;
  const s=_redo.pop();
  _hist.push(s);
  data=JSON.parse(s);
  _histLock=true;scheduleSave();_histLock=false;
  applyTheme();applyUiScale();render();
}
function duplicateTask(t){
  const i=data.tasks.indexOf(t);
  const c=cloneTask(t);c.name=t.name+"(コピー)";
  data.tasks.splice(i+1,0,c);
  scheduleSave();render();
}
async function load(){
  try{
    const v=await store.get();
    if(v){data=JSON.parse(v);}
  }catch(e){}
  if(!data)data={projectName:"",members:[],tasks:[],milestones:[]};
  if(!data.cats)data.cats=[];
  /* 旧形式の移行: cat文字列→catIds配列 / memberId→memberIds配列+noAsg */
  for(const t of data.tasks){
    if(t.cat){const cid=ensureCat(t.cat);t.catIds=t.catIds||[];if(cid&&!t.catIds.includes(cid))t.catIds.push(cid);}
    delete t.cat;
    if(t.catId){t.catIds=t.catIds||[];if(!t.catIds.includes(t.catId))t.catIds.push(t.catId);delete t.catId;}
    if(!t.catIds)t.catIds=[];
    if(t.memberId!==undefined){
      if(t.memberId==="__none")t.noAsg=true;
      else if(t.memberId)t.memberIds=[t.memberId];
      delete t.memberId;
    }
    if(!t.memberIds)t.memberIds=[];
    if(t.em){t.imp=3;delete t.em;}
  }
  for(const m of data.milestones){
    if(m.em){m.imp=3;delete m.em;}
  }
  if(!data.phases){
    data.phases=[];
    for(const t of data.tasks){const p=t.phase||"";if(p&&!data.phases.includes(p))data.phases.push(p);}
  }
  if(data.ui){
    if(data.ui.leftW)document.documentElement.style.setProperty("--leftW",data.ui.leftW+"px");
    if(data.ui.asgW)document.documentElement.style.setProperty("--asgW",data.ui.asgW+"px");
  }
}

/* ---------- range ---------- */
function range(){
  let min=today(),max=addD(today(),21);
  let has=false;
  for(const t of data.tasks){
    const s=parse(t.start),e=parse(t.end);
    if(!has){min=s;max=e;has=true;}
    if(s<min)min=s; if(e>max)max=e;
  }
  for(const m of data.milestones){
    const d=parse(m.date);
    if(!has){min=d;max=d;has=true;}
    if(d<min)min=d; if(d>max)max=d;
  }
  /* 本番日を設定している場合、そこまでは必ず表示範囲に含める。
     まだタスク/マイルストーンが無い状態では「今日〜本番日」を映す(本番日だけを起点にはしない) */
  if(data.eventDate){
    const es=parse(data.eventDate);
    const ee=data.eventEndDate?parse(data.eventEndDate):es;
    if(!has){min=today();max=ee;has=true;}
    if(es<min)min=es;
    if(ee>max)max=ee;
  }
  return{start:addD(min,-2),end:addD(max,3)};
}
const dayIdx=(r,d)=>Math.round((parse(d)-r.start)/DAY);

/* ---------- render ---------- */
function groupsOf(){
  for(const t of data.tasks){const p=t.phase||"";if(p&&!data.phases.includes(p))data.phases.push(p);}
  const groups=[];
  const un=data.tasks.filter(x=>!(x.phase||""));
  if(un.length)groups.push({phase:"",tasks:un});
  for(const p of data.phases)groups.push({phase:p,tasks:data.tasks.filter(x=>(x.phase||"")===p)});
  return groups;
}

/* フェイズの開閉(高さを実測してmax-heightをアニメーションさせる) */
function syncLayerHeights(){
  const rinner=$("#rinner");if(!rinner)return;
  const h=rinner.scrollHeight+"px";
  const ov=$("#overlay"),bg=$("#bglayer"),hc=$("#hoverCol");
  if(ov)ov.style.height=h;
  if(bg)bg.style.height=h;
  if(hc)hc.style.height=h;
}
function toggleAllPhases(willClose){
  /* 裏技: フェイズの開閉ボタンをShift+クリックすると、全フェイズをまとめて開閉する */
  data.ui={...(data.ui||{}),collapsedPhases:willClose?[...(data.phases||[])]:[]};
  scheduleSave();render();
}
function togglePhaseCollapse(phase,grp){
  const willClose=!grp.lWrap.classList.contains("collapsed");
  if(willClose){
    const hL=grp.lWrap.scrollHeight,hR=grp.rWrap.scrollHeight;
    grp.lWrap.style.maxHeight=hL+"px";grp.rWrap.style.maxHeight=hR+"px";
    grp.lWrap.offsetHeight; /* reflowを強制してtransitionを確実に発火させる */
    requestAnimationFrame(()=>{
      grp.lWrap.style.maxHeight="0px";grp.rWrap.style.maxHeight="0px";
      syncLayerHeights();
    });
    grp.lWrap.classList.add("collapsed");grp.rWrap.classList.add("collapsed");
    grp.lp.classList.add("collapsed");
  }else{
    grp.lWrap.classList.remove("collapsed");grp.rWrap.classList.remove("collapsed");
    grp.lp.classList.remove("collapsed");
    const hL=grp.lWrap.scrollHeight,hR=grp.rWrap.scrollHeight;
    grp.lWrap.style.maxHeight=hL+"px";grp.rWrap.style.maxHeight=hR+"px";
    syncLayerHeights();
    const clear=()=>{grp.lWrap.style.maxHeight="none";grp.lWrap.removeEventListener("transitionend",clear);syncLayerHeights();};
    grp.lWrap.addEventListener("transitionend",clear);
  }
  const list=new Set(data.ui?.collapsedPhases||[]);
  if(willClose)list.add(phase);else list.delete(phase);
  data.ui={...(data.ui||{}),collapsedPhases:[...list]};
  scheduleSave();
}

function pairHover(l,rr){
  const on=()=>{l.classList.add("hov");rr.classList.add("hov")};
  const off=()=>{l.classList.remove("hov");rr.classList.remove("hov")};
  l.addEventListener("mouseenter",on);l.addEventListener("mouseleave",off);
  rr.addEventListener("mouseenter",on);rr.addEventListener("mouseleave",off);
}

/* フェイズ(見出し+配下タスク)をマウスオーバーした時だけ強調し、それ以外をゆっくりディゾルブして薄くする。
   末尾のタスク行には黒い下線を付けて、フェイズの範囲がどこまでかを分かりやすくする。 */
function setPhaseFocus(grp,active){
  const gantt=$("#gantt");
  gantt.classList.toggle("phaseFocus",active);
  const method=active?"add":"remove";
  grp.lp.classList[method]("inFocus");
  grp.rp.classList[method]("inFocus");
  grp.rows.forEach(x=>{x.l.classList[method]("inFocus");x.rr.classList[method]("inFocus");});
  const last=grp.rows[grp.rows.length-1];
  if(last){last.l.classList[method]("phaseEnd");last.rr.classList[method]("phaseEnd");}
}

/* 列幅の自動調整: 手動調整(data.ui)がなければ内容に合わせる。長すぎる場合は上限で止めてドラッグ調整 */
function applyAutoCols(){
  const rt=document.documentElement.style;
  const avL=(DENS[data?.ui?.density]||DENS.m).av;
  if(!data.ui?.asgW){
    let w=48;
    for(const m of data.members)w=Math.max(w,avL+6+tw(m.name,'11px '+FS)+4);
    rt.setProperty("--asgW",Math.min(Math.max(Math.ceil(w),56),170)+"px");
  }
  if(!data.ui?.leftW){
    let nameW=90;
    for(const t of data.tasks){
      let w=tw(t.name,'600 12.5px '+FS);
      for(const c of catsOf(t).slice(0,2))w+=tw(c.name,'9.5px '+FS)+30;
      nameW=Math.max(nameW,w);
    }
    for(const p of data.phases)nameW=Math.max(nameW,tw(p,'700 13.5px '+FS)+18);
    const asgW=parseInt(getComputedStyle(document.documentElement).getPropertyValue("--asgW"))||86;
    const total=16+12+10+Math.ceil(nameW)+10+asgW+16+6;
    rt.setProperty("--leftW",Math.min(Math.max(total,220),480)+"px");
  }
}

function render(){
  _barReg={};
  applyTitleBar();
  $("#todayChk").checked=data.ui?.showToday!==false;
  applyAutoCols();
  const lbody=$("#lbody"),rinner=$("#rinner");
  const r=range();
  const nDays=Math.round((r.end-r.start)/DAY)+1;

  const fit=zoom==="fit";
  document.body.classList.toggle("fit",fit);
  if(fit){
    const avail=$("#rpane").clientWidth-2;
    dayW=Math.max(avail/nDays,3);
  }else{
    dayW=+zoom;
  }
  const tW=nDays*dayW;
  lbody.innerHTML="";
  rinner.innerHTML="";
  rinner.style.width=tW+"px";
  _mlbls=[];

  /* ---- right header (dates) ---- */
  const rhead=document.createElement("div");rhead.className="rhead";
  rhead.style.width=tW+"px";
  let curM=-1;
  /* 圧縮時も間引かず「毎日」表示を維持し、フォントだけ段階的に縮小する。
     それでも収まらない(dayW<8)場合だけ日付セル自体を表示しない。 */
  let dateFont=null;
  if(dayW>=22)dateFont=10.5;
  else if(dayW>=14)dateFont=10;
  else if(dayW>=11)dateFont=9;
  else if(dayW>=8)dateFont=7.5;
  /* 本番日の背景タイント: 週末の背景と同じくヘッダーの一番上から敷きたいので、
     日付セルより先に描画して背面に回す(日付の文字が隠れないように) */
  let evCsi=-1,evCei=-1;
  if(data.eventDate){
    const esi=dayIdx(r,data.eventDate);
    const eei=dayIdx(r,data.eventEndDate||data.eventDate);
    evCsi=Math.max(esi,0);evCei=Math.min(eei,nDays-1);
    if(evCei>=evCsi){
      const hb=document.createElement("div");hb.className="eventBand";
      hb.style.left=(evCsi*dayW)+"px";
      hb.style.width=((evCei-evCsi+1)*dayW)+"px";
      hb.style.top="0";hb.style.height="100%";hb.style.zIndex="0";
      rhead.appendChild(hb);
    }
  }
  for(let i=0;i<nDays;i++){
    const d=addD(r.start,i);
    const holiday=jpHolidayName(fmt(d));
    if(dayW>=4&&(d.getDay()===6||d.getDay()===0||holiday)){
      const f=document.createElement("div");f.className="hFill";
      f.classList.add(d.getDay()===6&&!holiday?"wsat":"wsun");
      f.style.left=(i*dayW)+"px";f.style.width=dayW+"px";
      rhead.appendChild(f);
    }
    if(d.getMonth()!==curM){
      curM=d.getMonth();
      if(i>0){
        const tk=document.createElement("div");tk.className="mTick";
        tk.style.left=(i*dayW)+"px";rhead.appendChild(tk);
      }
      const ml=document.createElement("div");ml.className="monthLbl";
      ml.style.left=(i*dayW)+"px";
      const origHasYear=(i===0||d.getMonth()===0);
      ml.textContent=origHasYear
        ?`${d.getFullYear()}年${d.getMonth()+1}月`
        :`${d.getMonth()+1}月`;
      rhead.appendChild(ml);
      if(_mlbls.length)_mlbls[_mlbls.length-1].x1=i*dayW;
      _mlbls.push({el:ml,x0:i*dayW,x1:tW,y:d.getFullYear(),mo:d.getMonth()+1,origHasYear});
    }
    if(dateFont!=null){
      const dc=document.createElement("div");dc.className="dayCell";
      dc.style.left=(i*dayW)+"px";
      dc.style.width=dayW+"px";
      dc.style.fontSize=dateFont+"px";
      if(d.getDay()===6&&!holiday)dc.classList.add("sat");
      if(d.getDay()===0||holiday)dc.classList.add("sun");
      if(fmt(d)===fmt(today()))dc.classList.add("today");
      if(data.ui?.showToday!==false&&fmt(d)<fmt(today()))dc.classList.add("pastDate");
      if(data.eventDate){
        const ds=fmt(d),evEnd=data.eventEndDate||data.eventDate;
        if(ds>=data.eventDate&&ds<=evEnd)dc.classList.add("eventday");
      }
      if(holiday)dc.title=holiday;
      const wdFont=Math.max(dateFont-1.5,6);
      dc.innerHTML=`<div>${d.getDate()}</div><div class="wd" style="font-size:${wdFont}px">${WD[d.getDay()]}</div>`;
      rhead.appendChild(dc);
    }
  }
  /* 本番日: 個々のセルではなく期間全体を1つの枠で囲んで強調する(背景タイントは上のループ前で描画済み) */
  if(evCei>=evCsi){
    const box=document.createElement("div");box.className="eventDateBox";
    box.style.left=(evCsi*dayW)+"px";
    box.style.width=((evCei-evCsi+1)*dayW)+"px";
    rhead.appendChild(box);
  }
  rinner.appendChild(rhead);
  const hd=document.createElement("div");hd.id="hoverDate";
  rhead.appendChild(hd);
  const hc=document.createElement("div");hc.id="hoverCol";
  rinner.appendChild(hc);
  _rs={r,nDays,dayW,tW};

  /* ---- background layer ---- */
  const bg=document.createElement("div");bg.id="bglayer";
  bg.style.width=tW+"px";
  /* 月の互い違い帯(隔月でうっすら色を敷き、月の切れ目を面で判別できるように) */
  {
    let mi=0,bandStart=0,curMo=addD(r.start,0).getMonth();
    for(let i=1;i<=nDays;i++){
      const mo=i<nDays?addD(r.start,i).getMonth():-1;
      if(mo!==curMo){
        if(mi%2===1){
          const b=document.createElement("div");b.className="mband";
          b.style.left=(bandStart*dayW)+"px";
          b.style.width=((i-bandStart)*dayW)+"px";
          b.style.background="var(--mband)";
          bg.appendChild(b);
        }
        bandStart=i;curMo=mo;mi++;
      }
    }
  }
  for(let i=0;i<nDays;i++){
    const d=addD(r.start,i);
    const holiday=jpHolidayName(fmt(d));
    if(dayW>=4&&(d.getDay()===6||d.getDay()===0||holiday)){
      const f=document.createElement("div");f.className="bgfill";
      f.classList.add(d.getDay()===6&&!holiday?"wsat":"wsun");
      f.style.left=(i*dayW)+"px";f.style.width=dayW+"px";
      bg.appendChild(f);
    }
    if(d.getDate()===1){
      const v=document.createElement("div");v.className="vline monthEdge";
      v.style.left=(i*dayW)+"px";bg.appendChild(v);
    }
  }
  for(const m of data.milestones){
    const mc=m.imp===3?"var(--imp)":m.imp===2?"var(--imp2)":"var(--stem)";
    const v=document.createElement("div");v.className="vline msline";
    v.style.left=(dayIdx(r,m.date)*dayW+dayW/2)+"px";v.style.borderLeftColor=mc;bg.appendChild(v);
    if(m.end){
      const v2=document.createElement("div");v2.className="vline msline";
      v2.style.left=(dayIdx(r,m.end)*dayW+dayW/2)+"px";v2.style.borderLeftColor=mc;bg.appendChild(v2);
    }
  }
  /* 今日の列: 縦線・薄い背景の帯・TODAYフラグで示す(TODAYチェックボックスでON/OFF) */
  const ti=dayIdx(r,fmt(today()));
  const showToday=data.ui?.showToday!==false;
  /* TODAYを表示している間だけ、今日より前に完全に終わっているタスク/マイルストーンを薄くする */
  const dimPast=showToday;
  if(showToday&&ti>=0&&ti<nDays){
    const tb=document.createElement("div");tb.className="todayBand";
    tb.style.left=(ti*dayW)+"px";tb.style.width=dayW+"px";
    bg.appendChild(tb);
    const tf=document.createElement("div");tf.className="todayFlag";
    tf.textContent="TODAY";
    tf.style.left=(ti*dayW+dayW/2)+"px";
    rhead.appendChild(tf);
  }
  rinner.appendChild(bg);

  /* 本番日の帯: フェイズ行の不透明な白背景(z-index:auto)より上、タスクバー(z-index:2)より下に見せたいので、
     bglayer(z-index:0)の中には入れず、独立したz-index:1のレイヤーとして重ねる */
  let evBand=null;
  if(data.eventDate){
    const esi=dayIdx(r,data.eventDate);
    const eei=dayIdx(r,data.eventEndDate||data.eventDate);
    const csi=Math.max(esi,0),cei=Math.min(eei,nDays-1);
    if(cei>=csi){
      evBand=document.createElement("div");evBand.className="eventBand";
      evBand.style.left=(csi*dayW)+"px";
      evBand.style.width=((cei-csi+1)*dayW)+"px";
      rinner.appendChild(evBand);
    }
  }

  /* ---- milestone lane (常時表示・バンドは文字入り/同列パッキング) ---- */
  {
    const impOf=o=>o.imp||1;
    const ms=[...data.milestones].sort((a,b)=>a.date<b.date?-1:1);
    const F1='600 10.5px '+FS;
    const F2='9.5px '+FS;
    /* 1) 各要素の基本情報。バンドは内側にラベルが収まるか判定 */
    const items=ms.map(m=>{
      const si=dayIdx(r,m.date);
      const ei=m.end?dayIdx(r,m.end):si;
      const x=si*dayW+dayW/2;
      const isRange=!!m.end;
      const bandL=si*dayW+1;
      const bandW=isRange?Math.max((ei-si+1)*dayW-2,8):0;
      const dstr=isRange?`${dfmt(parse(m.date))}〜${dfmt(parse(m.end))}`:dfmt(parse(m.date));
      const inTextW=tw(m.name,'700 10px '+FS)+tw(" "+dstr,'9px '+FS)+20;
      const internal=isRange&&bandW>=inTextW;
      return{m,si,ei,x,isRange,bandL,bandW,dstr,internal,imp:impOf(m)};
    });
    /* 2) 外側ラベル(点◆と、文字が収まらない狭いバンド)のレーン割当 */
    const lanesEnd=[];
    for(const it of items){
      if(it.internal)continue;
      const w=tw(it.m.name,F1)+tw(" "+it.dstr,F2)+8;
      let lx=it.x+9;
      if(lx+w>tW-4)lx=Math.max(it.x-9-w,2);
      let lane=0;
      for(;lane<lanesEnd.length;lane++){if(lx>=lanesEnd[lane]+14)break;}
      lanesEnd[lane]=lx+w;
      it.lx=lx;it.lane=lane;
    }
    const laneN=lanesEnd.length;
    /* 3) バンドのサブレーン: 触れ合う程度(2px)まで詰めて同列に並べる */
    const bands=items.filter(i=>i.isRange).sort((a,b)=>a.bandL-b.bandL);
    const bEnd=[];
    for(const bd of bands){
      let bl=0;
      for(;bl<bEnd.length;bl++){if(bd.bandL>=bEnd[bl]+2)break;}
      bEnd[bl]=bd.bandL+bd.bandW;
      bd.bLane=bl;
    }
    const bandN=bEnd.length;
    const hasPoints=items.some(i=>!i.isRange);
    const labelEnd=6+laneN*15;
    const pointY=labelEnd+6;
    const bandY0=(hasPoints?labelEnd+22:labelEnd+4);
    const H=Math.max(hasPoints?labelEnd+24:0,bandN?bandY0+bandN*22+4:0,labelEnd+8,36);
    const lms=document.createElement("div");lms.className="lrow ms";
    lms.style.height=H+"px";
    lms.innerHTML=`<span style="flex:1"></span><button class="rowAdd" title="マイルストーンを追加">＋</button>`;
    lms.querySelector(".rowAdd").onclick=e=>{if(zoom==="fit")return;e.stopPropagation();quickMsPopover(e.clientX,e.clientY,null);};
    const rms=document.createElement("div");rms.className="rrow ms";
    rms.style.height=H+"px";
    if(zoom!=="fit"){
      rms.title="ダブルクリックでこの日付に「名称未設定」マイルストーンを追加";
      rms.addEventListener("dblclick",e=>{
        if(e.target!==rms)return;
        const rc=rms.getBoundingClientRect();
        const di=Math.min(Math.max(Math.floor((e.clientX-rc.left)/(dayW*uiScale)),0),nDays-1);
        data.milestones.push({id:uid(),name:"名称未設定",date:fmt(addD(r.start,di))});
        data.milestones.sort((a,b)=>a.date<b.date?-1:1);
        scheduleSave();render();
      });
    }
    for(const it of items){
      const impCls=it.imp===3?" imp3":(it.imp===2?" imp2":"");
      const pastCls=(dimPast&&(it.isRange?it.ei:it.si)<ti)?" past":"";
      const yMark=it.isRange?bandY0+it.bLane*22:pointY;
      let stem=null,l=null;
      if(!it.internal){
        const lblTop=6+(laneN-1-it.lane)*15;
        stem=document.createElement("div");stem.className="diaStem";
        stem.style.left=it.x+"px";
        stem.style.top=(lblTop+13)+"px";
        stem.style.height=Math.max(yMark-1-(lblTop+13),0)+"px";
        rms.appendChild(stem);
        l=document.createElement("div");l.className="diaLbl"+impCls;
        l.style.left=it.lx+"px";l.style.top=lblTop+"px";
        l.innerHTML=`<b>${esc(it.m.name)}</b><span>${it.dstr}</span>`;
      }
      let d;
      if(it.isRange){
        d=document.createElement("div");d.className="msband"+impCls+pastCls;
        d.dataset.mid=it.m.id;
        d.style.left=it.bandL+"px";
        d.style.width=it.bandW+"px";
        d.style.top=yMark+"px";
        d.title=`${it.m.name} (${it.m.date}〜${it.m.end}) — ドラッグで移動 / 端をつまんで期間変更`;
        const inner=it.internal?`<span class="mbwrap"><span class="mbl">${esc(it.m.name)}</span><span class="mbd">${it.dstr}</span></span>`:"";
        d.innerHTML=inner+`<div class="h l"></div><div class="h r"></div>`;
      }else{
        d=document.createElement("div");d.className="dia"+impCls+pastCls;
        d.dataset.mid=it.m.id;
        d.style.left=(it.x-4.5)+"px";d.style.top=yMark+"px";
        d.title=`${it.m.name} (${it.m.date}) — ドラッグで移動 / 端をつまんで期間に変更`;
        d.innerHTML=`<div class="h l"></div><div class="h r"></div>`;
      }
      rms.appendChild(d);
      if(l)rms.appendChild(l);
      if(zoom==="fit")continue;
      d.addEventListener("mouseenter",()=>{_hoverMid=it.m.id});
      d.addEventListener("mouseleave",()=>{if(_hoverMid===it.m.id)_hoverMid=null});
      d.addEventListener("mousedown",ev=>{
        ev.preventDefault();
        const onHandle=ev.target.classList.contains("h");
        const mode=onHandle?(ev.target.classList.contains("l")?"l":"r"):"move";
        const dup=ev.altKey&&mode==="move"; /* Alt(Option)+ドラッグ = 複製(本体移動時のみ) */
        /* 複数選択中(2件以上)のマイルストーンのどれかを移動ドラッグした場合は、まとめて動かす */
        const groupMode=mode==="move"&&!dup&&selectedMsIds.has(it.m.id)&&selectedMsIds.size>1;
        const msGroup=groupMode
          ?items.filter(x=>x.m!==it.m&&selectedMsIds.has(x.m.id)).map(x=>({it:x,el:rms.querySelector(`[data-mid="${x.m.id}"]`),s0:x.si,e0:x.ei}))
          :[];
        const x0=ev.clientX;
        const s0=it.si,e0=it.ei;
        let moved=false,ns=s0,ne=e0;
        let target=d;
        const g=$("#gantt");
        g.classList.add("dragBars");
        lockCursor(dup?"copy":mode==="move"?"grabbing":"ew-resize");
        if(dup){
          target=d.cloneNode(true);
          target.style.opacity=".75";
          target.style.cursor="copy";
          d.parentNode.appendChild(target);
          d.classList.add("activeDrag");
        }else{
          if(stem)stem.classList.add("activeDrag");
          if(l)l.classList.add("activeDrag");
          msGroup.forEach(g=>{if(g.el)g.el.classList.add("activeDrag");});
        }
        target.classList.add("activeDrag");
        /* ドラッグ中だけ、期間なら左右外側に開始日・終了日、単発なら1つだけ日付ラベルを表示。
           単発が端ドラッグで期間に変わった場合はライブで2つ表示に切り替える */
        const sLbl=document.createElement("div");sLbl.className="dragEdgeLbl ms s";
        const eLbl=document.createElement("div");eLbl.className="dragEdgeLbl ms";
        target.parentNode.appendChild(sLbl);
        target.parentNode.appendChild(eLbl);
        sLbl.style.display=it.isRange?"":"none";
        const updateMsLbls=(ns,ne,nowRange)=>{
          const markerH=nowRange?18:9;
          const lblTop=yMark+(nowRange&&!it.isRange?-4.5:0)+(markerH-16)/2;
          if(nowRange){
            sLbl.style.display="";
            eLbl.classList.remove("c");
            const leftPx=ns*dayW+1,widthPx=Math.max((ne-ns+1)*dayW-2,8);
            sLbl.textContent=dfmt(addD(r.start,ns));
            sLbl.style.left=(leftPx-6)+"px";
            sLbl.style.top=lblTop+"px";
            eLbl.textContent=dfmt(addD(r.start,ne));
            eLbl.style.left=(leftPx+widthPx+6)+"px";
            eLbl.style.top=lblTop+"px";
          }else{
            sLbl.style.display="none";
            eLbl.classList.add("c");
            const cx=ns*dayW+dayW/2;
            eLbl.textContent=dfmt(addD(r.start,ns));
            eLbl.style.left=cx+"px";
            eLbl.style.top=lblTop+"px";
          }
        };
        updateMsLbls(s0,e0,it.isRange);
        const mm=e=>{
          const dd=Math.round((e.clientX-x0)/(dayW*uiScale));
          if(dd!==0)moved=true;
          if(mode==="move"){
            const shift=Math.min(Math.max(dd,-s0),(nDays-1)-e0);
            ns=s0+shift;ne=e0+shift;
            if(groupMode){
              msGroup.forEach(g=>{
                if(!g.el)return;
                const gs=g.s0+shift,ge=g.e0+shift;
                if(g.it.isRange){
                  g.el.style.left=(gs*dayW+1)+"px";
                }else{
                  g.el.style.left=(gs*dayW+dayW/2-4.5)+"px";
                }
              });
            }
          }else if(mode==="l"){
            ns=Math.min(Math.max(s0+dd,0),e0);
          }else{
            ne=Math.max(Math.min(e0+dd,nDays-1),s0);
          }
          const nx=ns*dayW+dayW/2;
          const nowRange=it.isRange||ns!==ne;
          if(nowRange){
            if(!it.isRange&&!target.classList.contains("stretching")){
              /* 単発◆が端ドラッグで伸び始めた瞬間、見た目を期間(バンド)風に切り替える */
              target.classList.add("stretching");
              target.style.top=(yMark-4.5)+"px";
            }
            target.style.left=(ns*dayW+1)+"px";
            target.style.width=Math.max((ne-ns+1)*dayW-2,8)+"px";
          }else{
            target.style.left=(nx-4.5)+"px";
          }
          const ndstr=nowRange
            ?`${dfmt(addD(r.start,ns))}〜${dfmt(addD(r.start,ne))}`
            :dfmt(addD(r.start,ns));
          if(!dup){
            if(stem)stem.style.left=nx+"px";
            if(l){
              l.style.left=(it.lx+(nx-it.x))+"px";
              l.querySelector("span").textContent=ndstr;
            }
            const mbd=d.querySelector(".mbd");
            if(mbd)mbd.textContent=ndstr;
          }
          updateMsLbls(ns,ne,nowRange);
        };
        const mu=()=>{
          document.removeEventListener("mousemove",mm);
          document.removeEventListener("mouseup",mu);
          unlockCursor();
          if(sLbl)sLbl.remove();
          eLbl.remove();
          g.classList.remove("dragBars");
          d.classList.remove("activeDrag");
          if(stem)stem.classList.remove("activeDrag");
          if(l)l.classList.remove("activeDrag");
          msGroup.forEach(gr=>{if(gr.el)gr.el.classList.remove("activeDrag");});
          if(dup){
            target.remove();
            if(moved){
              const nm={id:uid(),name:it.m.name,date:fmt(addD(r.start,ns))};
              if(it.m.end)nm.end=fmt(addD(r.start,ne));
              if(it.m.imp)nm.imp=it.m.imp;
              data.milestones.push(nm);
              data.milestones.sort((a,b)=>a.date<b.date?-1:1);
              scheduleSave();render();
            }
            return;
          }
          if(moved){
            it.m.date=fmt(addD(r.start,ns));
            if(ns===ne)delete it.m.end; /* 期間型を縮めて単日になったら単発マイルストーンに戻す */
            else if(it.isRange||ns!==ne)it.m.end=fmt(addD(r.start,ne));
            if(groupMode){
              const shift=ns-s0;
              msGroup.forEach(gr=>{
                gr.it.m.date=fmt(addD(r.start,gr.s0+shift));
                if(gr.it.isRange)gr.it.m.end=fmt(addD(r.start,gr.e0+shift));
              });
            }
            data.milestones.sort((a,b)=>a.date<b.date?-1:1);
            scheduleSave();render();
          }else openMsModal(it.m);
        };
        document.addEventListener("mousemove",mm);
        document.addEventListener("mouseup",mu);
      });
    }
    pairHover(lms,rms);
    lbody.appendChild(lms);rinner.appendChild(rms);
  }

  /* ---- task groups ---- */
  const groups=groupsOf();
  const phaseGroups={};
  for(const g of groups){
    let lTarget=lbody,rTarget=rinner;
    if(g.phase){
      const lp=document.createElement("div");lp.className="lrow phase";
      lp.dataset.phase=g.phase;lp.style.height=(DENS[data?.ui?.density]||DENS.m).phase+"px";
      const collapsed=(data.ui?.collapsedPhases||[]).includes(g.phase);
      if(collapsed)lp.classList.add("collapsed");
      lp.innerHTML=`<button class="phToggle" title="タスクの表示/非表示(Shift+クリックで全フェイズをまとめて開閉)">▾</button><span class="grip" title="ドラッグで並び替え">⠿</span><span class="pbar"></span><span class="pname">${esc(g.phase)}</span><button class="rowAdd" title="${esc(g.phase)}にタスクを追加">＋</button>`;
      /* フェイズ名あたりもどこを掴んでも良いようにする: 動かさず短く離せば編集、動かすか長押しすればそのままドラッグ(並び替え)開始 */
      lp.addEventListener("mousedown",e=>{
        if(zoom==="fit")return;
        if(e.target.closest(".grip,.rowAdd,.phToggle"))return;
        const sx=e.clientX,sy=e.clientY;
        let started=false;
        const cleanup=()=>{
          clearTimeout(timer);
          document.removeEventListener("mousemove",onMove);
          document.removeEventListener("mouseup",onUp);
        };
        const startDrag=()=>{
          if(started)return;
          started=true;cleanup();startPhaseReorder(e,g.phase);
        };
        const onMove=me=>{
          if(Math.abs(me.clientX-sx)>4||Math.abs(me.clientY-sy)>4)startDrag();
        };
        const onUp=()=>{
          cleanup();
          if(!started)openPhaseModal(g.phase); /* 動かさないまま離した=短いクリックとして編集を開く */
        };
        const timer=setTimeout(startDrag,350); /* 動かさなくても長押しすればドラッグ開始 */
        document.addEventListener("mousemove",onMove);
        document.addEventListener("mouseup",onUp);
      });
      lp.querySelector(".rowAdd").onclick=e=>{
        if(zoom==="fit")return;
        e.stopPropagation();quickTaskPopover(e.clientX,e.clientY,g.phase);
      };
      const gripEl=lp.querySelector(".grip");
      gripEl.addEventListener("mousedown",e=>{
        if(zoom==="fit")return;
        e.preventDefault();e.stopPropagation();startPhaseReorder(e,g.phase);
      });
      const rp=document.createElement("div");rp.className="rrow phase";
      rp.dataset.phase=g.phase;
      rp.style.height=(DENS[data?.ui?.density]||DENS.m).phase+"px";
      rp.title="ドラッグで並び替え";
      rp.addEventListener("mousedown",e=>{
        if(zoom==="fit")return;
        e.preventDefault();startPhaseReorder(e,g.phase);
      });
      lbody.appendChild(lp);rinner.appendChild(rp);
      /* フェイズ配下タスクの最小開始日〜最大終了日をまとめた集計バー。閉じていても常に表示され、フェイズ全体のスケール感がひと目で分かる */
      if(g.tasks.length){
        let minStart=g.tasks[0].start,maxEnd=g.tasks[0].end;
        for(const t of g.tasks){
          if(t.start<minStart)minStart=t.start;
          if(t.end>maxEnd)maxEnd=t.end;
        }
        const ms=dayIdx(r,minStart),me=dayIdx(r,maxEnd);
        const barLeftPx=ms*dayW,barWidthPx=Math.max((me-ms+1)*dayW-2,12);
        /* ラベル(フェイズ名)の幅をあらかじめ測って、バーを「左線 - 文字 - 右線」に分割する位置を決める */
        const labelW=tw(g.phase,`700 11px ${FS}`);
        const labelLeft=barLeftPx+14;
        const gap=6;
        const seg1W=Math.max(labelLeft-gap-barLeftPx,0); /* 左側の線(始点〜文字の手前) */
        const seg2Left=labelLeft+labelW+gap;
        const seg2W=Math.max(barLeftPx+barWidthPx-seg2Left,8); /* 右側の線(文字の後ろ〜矢尻) */

        /* ドラッグの当たり判定は全幅を透明なまま1つの要素でカバーする(掴む場所を選ばないように) */
        const sb=document.createElement("div");sb.className="phaseSummaryBar";
        sb.style.left=barLeftPx+"px";
        sb.style.width=barWidthPx+"px";
        sb.style.background="transparent";
        sb.title=`${g.phase}: ${dfmt(parse(minStart))}〜${dfmt(parse(maxEnd))} — ドラッグで配下タスクをまとめて日付移動`;
        rp.appendChild(sb);
        /* 見た目はこの2本の線分だけで描く(文字の背後は完全に空けて、フェード時も不自然にならないようにする) */
        const sbSeg1=document.createElement("div");sbSeg1.className="phaseSummarySeg";
        sbSeg1.style.left=barLeftPx+"px";sbSeg1.style.width=seg1W+"px";
        rp.appendChild(sbSeg1);
        const sbSeg2=document.createElement("div");sbSeg2.className="phaseSummarySeg arrow";
        sbSeg2.style.left=seg2Left+"px";sbSeg2.style.width=seg2W+"px";
        rp.appendChild(sbSeg2);
        if(zoom!=="fit"){
          sb.addEventListener("mousedown",ev=>{
            ev.preventDefault();ev.stopPropagation(); /* rp自体のフェイズ並び替えドラッグと競合しないようにする */
            const x0=ev.clientX,y0=ev.clientY;
            const members=g.tasks.map(gt=>{
              const reg=_barReg[gt.id];
              return reg?{t:gt,r:reg.r,bar:reg.bar,s0:dayIdx(reg.r,gt.start),e0:dayIdx(reg.r,gt.end)}:null;
            }).filter(Boolean);
            if(!members.length)return;
            let moved=false,handedOff=false;
            const gEl=$("#gantt");
            gEl.classList.add("dragBars");
            lockCursor("grabbing");
            sb.classList.add("activeDrag");
            sbSeg1.classList.add("activeDrag");sbSeg2.classList.add("activeDrag");
            const memberGhosts=members.map(mmb=>{mmb.bar.classList.add("activeDrag");return makeBarGhost(mmb.bar);});
            /* フェイズの集計バー自体も、元の位置に薄いゴーストを残す。
               文字の隙間は本物のバーだけの都合なので、ゴースト側は隙間を空けず1本の連続した線にする */
            let sbGhost=null,stGhost=null;
            try{
              sbGhost=document.createElement("div");sbGhost.className="phaseSummarySeg arrow dragGhostPhase";
              sbGhost.style.left=barLeftPx+"px";sbGhost.style.width=barWidthPx+"px";
              rp.insertBefore(sbGhost,sb);
              stGhost=document.createElement("div");stGhost.className="phaseSummaryStart dragGhostPhase";
              stGhost.style.left=barLeftPx+"px";
              rp.insertBefore(stGhost,st);
            }catch(err){sbGhost=null;stGhost=null;}
            const sbLeft0=ms*dayW;
            const cleanup=()=>{
              document.removeEventListener("mousemove",mm);
              document.removeEventListener("mouseup",mu);
              unlockCursor();
              gEl.classList.remove("dragBars");
              sb.classList.remove("activeDrag");
              sbSeg1.classList.remove("activeDrag");sbSeg2.classList.remove("activeDrag");
              members.forEach(mmb=>mmb.bar.classList.remove("activeDrag"));
              memberGhosts.forEach(gh=>{if(gh)gh.remove();});
              if(sbGhost)sbGhost.remove();
              if(stGhost)stGhost.remove();
            };
            const mm=e=>{
              const dyAbs=Math.abs(e.clientY-y0),dxAbs=Math.abs(e.clientX-x0);
              if(dyAbs>10&&dyAbs>dxAbs){
                /* 縦方向への意図がはっきりしたら、フェイズ自体の並び替えに切り替える(バー上でも上下できるように) */
                handedOff=true;
                cleanup();
                startPhaseReorder(ev,g.phase);
                return;
              }
              const dd=Math.round((e.clientX-x0)/(dayW*uiScale));
              if(dd!==0)moved=true;
              const shiftPx=dd*dayW;
              sb.style.left=(sbLeft0+shiftPx)+"px";
              sbSeg1.style.left=(barLeftPx+shiftPx)+"px";
              sbSeg2.style.left=(seg2Left+shiftPx)+"px";
              st.style.left=(barLeftPx+shiftPx)+"px";
              sl.style.left=(labelLeft+shiftPx)+"px";
              members.forEach(mmb=>{
                const s=mmb.s0+dd,en=mmb.e0+dd;
                mmb.bar.style.left=(s*dayW)+"px";
                mmb.bar.dataset.s=s;mmb.bar.dataset.e=en;
              });
            };
            const mu=()=>{
              if(handedOff)return;
              cleanup();
              if(moved){
                members.forEach(mmb=>{
                  mmb.t.start=fmt(addD(mmb.r.start,+mmb.bar.dataset.s));
                  mmb.t.end=fmt(addD(mmb.r.start,+mmb.bar.dataset.e));
                });
                scheduleSave();render();
              }
            };
            document.addEventListener("mousemove",mm);
            document.addEventListener("mouseup",mu);
          });
        }
        /* 始点の縦線はバー本体のclip-pathに巻き込まれないよう別要素で描画する */
        const st=document.createElement("div");st.className="phaseSummaryStart";
        st.style.left=barLeftPx+"px";
        rp.appendChild(st);
        /* フェイズ名は左右の線分の間に、背景無しでそのまま置く(フェードしても不自然にならない) */
        const sl=document.createElement("div");sl.className="phaseSummaryLabel";
        sl.textContent=g.phase;
        sl.style.left=labelLeft+"px";
        rp.appendChild(sl);
      }
      pairHover(lp,rp);
      /* タスク行はラッパーに入れ、開閉時はmax-heightをアニメーションさせる(再描画せず滑らかに) */
      const lWrap=document.createElement("div");lWrap.className="taskGroupWrap";
      const rWrap=document.createElement("div");rWrap.className="taskGroupWrap";
      if(collapsed){lWrap.classList.add("collapsed");rWrap.classList.add("collapsed");lWrap.style.maxHeight="0px";rWrap.style.maxHeight="0px";}
      lbody.appendChild(lWrap);rinner.appendChild(rWrap);
      lTarget=lWrap;rTarget=rWrap;
      const grp=phaseGroups[g.phase]={lp,rp,lWrap,rWrap,rows:[]};
      /* フェイズ行はどこをホバーしても同じ挙動にする(＋ボタンでのタスク追加は引き続き機能する)。
         配下のタスクも含めて丸ごと浮かせ、ドラッグすると一緒に動く範囲をホバーの時点で示唆する */
      const phLiftOn=()=>{
        lp.classList.add("blockLift");rp.classList.add("blockLift");
        grp.rows.forEach(x=>{x.l.classList.add("blockLift");x.rr.classList.add("blockLift");});
      };
      const phLiftOff=()=>{
        lp.classList.remove("blockLift");rp.classList.remove("blockLift");
        grp.rows.forEach(x=>{x.l.classList.remove("blockLift");x.rr.classList.remove("blockLift");});
      };
      lp.addEventListener("mouseenter",phLiftOn);
      lp.addEventListener("mouseleave",phLiftOff);
      rp.addEventListener("mouseenter",phLiftOn);
      rp.addEventListener("mouseleave",phLiftOff);
      lp.querySelector(".phToggle").onclick=e=>{
        e.stopPropagation();
        if(e.shiftKey){
          const willClose=!grp.lWrap.classList.contains("collapsed");
          toggleAllPhases(willClose);
        }else{
          togglePhaseCollapse(g.phase,grp);
        }
      };
      const setHovPhase=()=>{_hoverPhase=g.phase};
      const clrHovPhase=()=>{if(_hoverPhase===g.phase)_hoverPhase=null};
      lp.addEventListener("mouseenter",setHovPhase);rp.addEventListener("mouseenter",setHovPhase);
      lp.addEventListener("mouseleave",clrHovPhase);rp.addEventListener("mouseleave",clrHovPhase);
      lp.addEventListener("mouseenter",()=>setPhaseFocus(grp,true));
      rp.addEventListener("mouseenter",()=>setPhaseFocus(grp,true));
      lp.addEventListener("mouseleave",()=>setPhaseFocus(grp,false));
      rp.addEventListener("mouseleave",()=>setPhaseFocus(grp,false));
    }
    for(const t of g.tasks)addTaskRow(t,r,tW,lTarget,rTarget,nDays,phaseGroups,dimPast);
  }
  /* フェイズ→タスクの階層線: 各グループの最後のタスクだけ縦線を行の中央で止める */
  for(const p in phaseGroups){
    const rows=phaseGroups[p].rows;
    if(rows.length)rows[rows.length-1].l.classList.add("lastInPhase");
  }
  /* 末尾のゴースト追加行(全体表示モードでは非表示) */
  if(zoom!=="fit"){
    const lastPhase=groups.length?groups[groups.length-1].phase:"";
    const lg=document.createElement("div");lg.className="lrow ghost";
    lg.style.height="32px";lg.textContent="＋ タスクを追加";
    lg.onclick=e=>{if(zoom!=="fit")quickTaskPopover(e.clientX,e.clientY,lastPhase);};
    const rg=document.createElement("div");rg.className="rrow ghost";
    rg.style.height="32px";
    if(zoom!=="fit"){
      rg.title="ダブルクリックでこの日付に「名称未設定」タスクを追加";
      rg.addEventListener("dblclick",e=>{
        const rc=rg.getBoundingClientRect();
        const di=Math.min(Math.max(Math.floor((e.clientX-rc.left)/(dayW*uiScale)),0),nDays-1);
        const s=fmt(addD(r.start,di));
        const en=fmt(addD(r.start,Math.min(di+4,nDays-1)));
        data.tasks.push({id:uid(),name:"名称未設定",memberIds:[],noAsg:false,catIds:[],phase:resolveTaskPhase(lastPhase),start:s,end:en,imp:1});
        scheduleSave();render();
      });
    }
    pairHover(lg,rg);
    lbody.appendChild(lg);rinner.appendChild(rg);
  }

  /* ---- overlay (today line / event day line) ---- */
  const ov=document.createElement("div");ov.id="overlay";
  ov.style.width=tW+"px";
  if(showToday&&ti>=0&&ti<nDays){
    const v=document.createElement("div");v.className="vline today";
    v.style.left=(ti*dayW+dayW/2)+"px";ov.appendChild(v);
  }
  rinner.appendChild(ov);
  requestAnimationFrame(()=>{
    const h=rinner.scrollHeight+"px";
    ov.style.height=h;bg.style.height=h;hc.style.height=h;
    if(evBand)evBand.style.height=h;
    updateMonthLabels();
    updateMonthLabelPositions();
    updateTodayJump();
    rebuildStickyCache();
    updateStickyBlabels();
  });
}

function addTaskRow(t,r,tW,lbody,rinner,nDays,phaseGroups,dimPast){
  const mems=membersOf(t);
  const m=mems[0];
  const l=document.createElement("div");l.className="lrow"+(t.phase?"":" noPhase");
  l.dataset.tid=t.id;
  const noasg=!mems.length&&t.noAsg;
  const avHtml=x=>`<span class="avs">${x.icon?`<img src="${x.icon}" alt="">`:`<span class="dot" style="background:${x.color}"></span>`}</span>`;
  let asgInner="";
  if(!noasg){
    if(!mems.length){
      asgInner=`<span class="avs"><span class="dot none"></span></span><span class="nm" style="color:var(--faint)">未定</span>`;
    }else{
      asgInner=`<span class="avstack">${mems.slice(0,3).map(avHtml).join("")}</span><span class="nm">${esc(m.name)}</span>`+
        (mems.length>1?`<span class="more">+${mems.length-1}</span>`:"");
    }
  }
  const cats=catsOf(t);
  const catHtml=cats.slice(0,2).map(c=>`<span class="catTag" title="カテゴリ: ${esc(c.name)}"><span class="cdot" style="background:${c.color}"></span>${esc(c.name)}</span>`).join("")+
    (cats.length>2?`<span class="catTag">+${cats.length-2}</span>`:"");
  l.innerHTML=`<span class="grip" title="ドラッグで並び替え">⠿</span><span class="tnameWrap"><span class="tdot"></span><span class="taskName">${esc(t.name)}</span></span>`+
    catHtml+
    `<span class="asg">${asgInner}</span>`;
  /* 行のどこを掴んでも良いようにする: 動かさず短く離せば編集、動かすか長押しすればそのままドラッグ(並び替え)開始。
     グリップ(⠿)自体は従来通り即ドラッグの専用ハンドラを別途持つ */
  l.addEventListener("mousedown",e=>{
    if(zoom==="fit")return;
    if(e.target.closest(".grip"))return;
    if(e.shiftKey){
      /* Shift+クリック: 並び替えは始めず、選択のトグルだけ行う */
      e.preventDefault();e.stopPropagation();
      if(selectedTaskIds.has(t.id)){
        selectedTaskIds.delete(t.id);bar.classList.remove("selected");l.classList.remove("selected");
      }else{
        selectedTaskIds.add(t.id);bar.classList.add("selected");l.classList.add("selected");
      }
      return;
    }
    const sx=e.clientX,sy=e.clientY;
    let started=false;
    const cleanup=()=>{
      clearTimeout(timer);
      document.removeEventListener("mousemove",onMove);
      document.removeEventListener("mouseup",onUp);
    };
    const startDrag=()=>{
      if(started)return;
      started=true;cleanup();startReorder(e,t);
    };
    const onMove=me=>{
      if(Math.abs(me.clientX-sx)>4||Math.abs(me.clientY-sy)>4)startDrag();
    };
    const onUp=()=>{
      cleanup();
      if(!started)openTaskModal(t); /* 動かさないまま離した=短いクリックとして編集を開く */
    };
    const timer=setTimeout(startDrag,350); /* 動かさなくても長押しすればドラッグ開始 */
    document.addEventListener("mousemove",onMove);
    document.addEventListener("mouseup",onUp);
  });
  const gripEl=l.querySelector(".grip");
  gripEl.addEventListener("mousedown",e=>{
    if(zoom==="fit")return;
    if(e.shiftKey){
      /* Shift+グリップ: 並び替えは始めず、バーと同じく選択のトグルだけ行う。
         バーは画面外にあることも多いので、左側の行自体にも選択表示を出す */
      e.preventDefault();e.stopPropagation();
      if(selectedTaskIds.has(t.id)){
        selectedTaskIds.delete(t.id);bar.classList.remove("selected");l.classList.remove("selected");
      }else{
        selectedTaskIds.add(t.id);bar.classList.add("selected");l.classList.add("selected");
      }
      return;
    }
    e.preventDefault();e.stopPropagation();startReorder(e,t);
  });

  const rr=document.createElement("div");rr.className="rrow";
  rr.dataset.tid=t.id;
  const gripLiftOn=()=>{l.classList.add("blockLift");rr.classList.add("blockLift");};
  const gripLiftOff=()=>{l.classList.remove("blockLift");rr.classList.remove("blockLift");};
  gripEl.addEventListener("mouseenter",gripLiftOn);
  gripEl.addEventListener("mouseleave",gripLiftOff);
  const s=dayIdx(r,t.start),e=dayIdx(r,t.end);
  const bar=document.createElement("div");bar.className="bar";
  const barW=Math.max((e-s+1)*dayW,4);
  bar.style.left=(s*dayW)+"px";
  bar.style.width=barW+"px";
  bar.style.background=m?m.color:(noasg?"var(--text)":"#A6ACB5");
  if(noasg)bar.style.color="var(--bg)";
  const imp=t.imp||1;
  if(imp===3){bar.style.background="var(--imp)";bar.style.color="#fff";bar.classList.add("impB");}
  else if(imp===2){bar.style.background="var(--imp2)";bar.style.color="#332800";bar.classList.add("impB");}
  const days=e-s+1;
  const dateRangeStr=s===e?dfmt(parse(t.start)):`${dfmt(parse(t.start))}〜${dfmt(parse(t.end))}`;
  bar.title=`${esc(t.name)}${cats.length?` [${cats.map(c=>esc(c.name)).join("/")}]`:""}${mems.length?`  担当: ${mems.map(x=>esc(x.name)).join("・")}`:""}  ${dateRangeStr}`;
  const barH=(DENS[data?.ui?.density]||DENS.m).bar;
  const avMems=mems.slice(0,3);
  const hasav=avMems.length>0&&barW>=barH+16;
  const wide=(e-s+1)*dayW>50; /* 標準ズームが46→20px/日に変わったため、しきい値もそれに合わせて下げてある */
  const ti=dayIdx(r,fmt(today()));
  const dayChipTxt=`${days}日間`;
  const dtxt=`${dateRangeStr}(${days}日)`;
  const catNames=cats.map(c=>c.name).join("/");
  /* バーが短いときは名前(+カテゴリ)をバー外に表示してはみ出しでも読めるように(従来通り・フリップあり) */
  const outHtml=(wide?"":`<b class="on">${esc(t.name)}</b>`+(cats.length?`<span class="ocat">[${esc(catNames)}]</span>`:""))+dtxt;
  const outW=(wide?0:tw(t.name,'600 10.5px '+FS)+6+(cats.length?tw("["+catNames+"]",'9.5px '+FS)+5:0))+tw(dtxt,'10px '+FS)+12;
  const flip=(s*dayW+barW+outW>tW)&&(s*dayW>outW);
  /* 広いバーは、ドラッグ時だけでなく普段から左端に開始日・右端に終了日を薄く常時表示する */
  const edgeDates=wide
    ?`<span class="edgeDate l">${dfmt(parse(t.start))}</span><span class="edgeDate r">${dfmt(parse(t.end))} <span class="dayChip">${dayChipTxt}</span></span>`
    :"";
  /* カテゴリは「+N」に畳まず、複数あれば1つずつチップとして並べて表示する */
  const bcat=(wide&&cats.length)?cats.map(c=>`<span class="bcat"><span class="cdot" style="background:${c.color}"></span>${esc(c.name)}</span>`).join(""):"";
  const avImgs=hasav?`<span class="bavstack">${avMems.map(x=>x.icon?`<img src="${x.icon}" alt="">`:`<span class="cdot" style="background:${x.color}"></span>`).join("")}</span>`:"";
  /* アイコン・名前・カテゴリは1つのsticky塊としてまとめ、横スクロール時も一緒に左端へ追従させる */
  const blabel=`<span class="blabel">${avImgs}${wide?`<span class="lbl">${esc(t.name)}</span>`:""}${bcat}</span>`;
  bar.innerHTML=`<div class="h l"></div>${blabel}<div class="h r"></div>`+
    (wide?edgeDates:`<span class="out${flip?" flip":""}">${outHtml}</span>`);
  if(dimPast){
    const pastEndIdx=Math.min(e,ti-1);
    if(pastEndIdx>=s){
      const pastW=Math.min((pastEndIdx-s+1)*dayW,barW);
      const pv=document.createElement("div");pv.className="barPastVeil";
      pv.style.width=pastW+"px";
      if(pastW>=barW)pv.style.borderRadius="5px";
      bar.appendChild(pv);
    }
  }
  _barReg[t.id]={bar,t,r};
  if(selectedTaskIds.has(t.id))bar.classList.add("selected");
  if(zoom!=="fit")attachDrag(bar,t,r,l);
  rr.appendChild(bar);
  if(zoom!=="fit"){
    rr.title="バーのない場所をダブルクリックでこの日付に「名称未設定」タスクを追加(上半分なら上に、下半分なら下に挿入)";
    rr.addEventListener("dblclick",ev=>{
      if(ev.target.closest(".bar"))return; /* バー上でのダブルクリックは無視 */
      const rc=rr.getBoundingClientRect();
      const di=Math.min(Math.max(Math.floor((ev.clientX-rc.left)/(dayW*uiScale)),0),nDays-1);
      const ns=fmt(addD(r.start,di));
      const ne=fmt(addD(r.start,Math.min(di+4,nDays-1)));
      const i=data.tasks.indexOf(t);
      const upperHalf=ev.clientY<rc.top+rc.height/2; /* 行の上半分でダブルクリックしたら上に、下半分なら下に追加する */
      data.tasks.splice(upperHalf?i:i+1,0,{id:uid(),name:"名称未設定",memberIds:[],noAsg:false,catIds:[],phase:resolveTaskPhase(t.phase||""),start:ns,end:ne,imp:1});
      scheduleSave();render();
    });
  }

  pairHover(l,rr);
  const setHov=()=>{_hoverTid=t.id};
  const clrHov=()=>{if(_hoverTid===t.id)_hoverTid=null};
  l.addEventListener("mouseenter",setHov);rr.addEventListener("mouseenter",setHov);
  l.addEventListener("mouseleave",clrHov);rr.addEventListener("mouseleave",clrHov);

  /* このタスクが属するフェイズのグループに自分を登録しておく(フェイズ→タスクの階層線描画で使う) */
  const grp=t.phase&&phaseGroups?phaseGroups[t.phase]:null;
  if(grp)grp.rows.push({l,rr});

  lbody.appendChild(l);rinner.appendChild(rr);
}

/* ---------- hover date column ---------- */
$("#rpane").addEventListener("mousemove",e=>{
  if(!_rs)return;
  const hc=$("#hoverCol"),hd=$("#hoverDate");
  if(!hc||!hd)return;
  const ri=$("#rinner").getBoundingClientRect();
  const x=(e.clientX-ri.left)/uiScale;
  if(x<0||x>=_rs.tW){hc.style.display="none";hd.style.display="none";return;}
  const di=Math.min(Math.max(Math.floor(x/_rs.dayW),0),_rs.nDays-1);
  hc.style.left=(di*_rs.dayW)+"px";
  hc.style.width=_rs.dayW+"px";
  hc.style.display="block";

  hd.textContent=`${d.getMonth()+1}/${d.getDate()}(${WD[d.getDay()]})`;
  hd.style.left=(di*_rs.dayW+_rs.dayW/2)+"px";

});
$("#rpane").addEventListener("mouseleave",()=>{

/* ---------- 空いている場所をドラッグして矩形(マーキー)選択 ---------- */
$("#rpane").addEventListener("mousedown",ev=>{
  if(zoom==="fit")return;
  if(ev.target.closest(".bar,.dia,.msband,.rrow.phase,.h"))return; /* バーなど既存要素の上では発動しない */
  if(ev.button!==0)return;
  ev.preventDefault(); /* これが無いと、ドラッグ中にブラウザ標準のテキスト選択も一緒に発生してしまう */
  document.body.classList.add("marqueeActive");
  const x0=ev.clientX,y0=ev.clientY;
  let moved=false;
  const box=document.createElement("div");box.id="marqueeBox";
  document.body.appendChild(box);
  const updateBox=(x1,y1)=>{
    const left=Math.min(x0,x1),top=Math.min(y0,y1);
    box.style.left=left+"px";box.style.top=top+"px";
    box.style.width=Math.abs(x1-x0)+"px";box.style.height=Math.abs(y1-y0)+"px";
  };
  updateBox(x0,y0);
  const mm=e=>{
    if(Math.abs(e.clientX-x0)>3||Math.abs(e.clientY-y0)>3)moved=true;
    if(moved){box.style.display="block";updateBox(e.clientX,e.clientY);}
  };
  const mu=e=>{
    document.removeEventListener("mousemove",mm);
    document.removeEventListener("mouseup",mu);
    box.remove();
    document.body.classList.remove("marqueeActive");
    if(!moved)return;
    const left=Math.min(x0,e.clientX),right=Math.max(x0,e.clientX);
    const top=Math.min(y0,e.clientY),bottom=Math.max(y0,e.clientY);
    if(!ev.shiftKey)clearSelection();
    document.querySelectorAll("#rinner .bar").forEach(barEl=>{
      const br=barEl.getBoundingClientRect();
      if(br.left<right&&br.right>left&&br.top<bottom&&br.bottom>top){
        const rrEl=barEl.closest(".rrow[data-tid]");
        if(rrEl){
          selectedTaskIds.add(rrEl.dataset.tid);
          barEl.classList.add("selected");
          const lEl=$("#lbody").querySelector(`.lrow[data-tid="${rrEl.dataset.tid}"]`);
          if(lEl)lEl.classList.add("selected");
        }
      }
    });
    document.querySelectorAll("#rinner .dia,#rinner .msband").forEach(msEl=>{
      const br=msEl.getBoundingClientRect();
      if(br.left<right&&br.right>left&&br.top<bottom&&br.bottom>top&&msEl.dataset.mid){
        selectedMsIds.add(msEl.dataset.mid);
        msEl.classList.add("selected");
      }
    });
    document.querySelectorAll("#rinner .rrow.phase").forEach(rpEl=>{
      const br=rpEl.getBoundingClientRect();
      if(br.left<right&&br.right>left&&br.top<bottom&&br.bottom>top){
        const ph=rpEl.dataset.phase||"";
        selectedPhases.add(ph);
        rpEl.classList.add("selected");
        const lpEl=$("#lbody").querySelector(`.lrow.phase[data-phase="${ph}"]`);
        if(lpEl)lpEl.classList.add("selected");
      }
    });
    _marqueeJustSelected=true;
  };
  document.addEventListener("mousemove",mm);
  document.addEventListener("mouseup",mu);
});

/* ---------- horizontal drag (bars) ---------- */
function clearSelection(){
  if(!selectedTaskIds.size&&!selectedMsIds.size&&!selectedPhases.size)return;
  selectedTaskIds.clear();
  selectedMsIds.clear();
  selectedPhases.clear();
  document.querySelectorAll(".bar.selected,.lrow[data-tid].selected,.dia.selected,.msband.selected,.lrow.phase.selected,.rrow.phase.selected").forEach(el=>el.classList.remove("selected"));
}
/* 移動ドラッグ中、元の位置に残す薄いグレーのゴースト(タスクバー・フェイズ集計バーどちらのドラッグからも使う)。
   top/heightはインラインではなくCSS側で決まっているため、computedStyleから実際の値を取る。
   万一失敗してもドラッグ全体が止まらないようtry/catchで保護する(dragBarsクラスが消えなくなるのを防ぐ) */
function makeBarGhost(srcBar){
  try{
    const cs=getComputedStyle(srcBar);
    const gh=document.createElement("div");
    gh.className="bar dragGhost";
    gh.style.left=srcBar.style.left||cs.left;
    gh.style.width=srcBar.style.width||cs.width;
    gh.style.top=cs.top;
    gh.style.height=cs.height;
    srcBar.parentNode.insertBefore(gh,srcBar);
    return gh;
  }catch(err){
    return null;
  }
}
function attachDrag(bar,t,r,l){
  bar.addEventListener("mousedown",ev=>{
    ev.preventDefault();
    const onHandle=ev.target.classList.contains("h");
    const mode=onHandle?(ev.target.classList.contains("l")?"l":"r"):"move";

    /* Shift+クリック: ドラッグは始めず、選択のトグルだけ行う */
    if(ev.shiftKey&&!onHandle){
      ev.stopPropagation();
      if(selectedTaskIds.has(t.id)){
        selectedTaskIds.delete(t.id);bar.classList.remove("selected");if(l)l.classList.remove("selected");
      }else{
        selectedTaskIds.add(t.id);bar.classList.add("selected");if(l)l.classList.add("selected");
      }
      return;
    }
    /* 選択済み(2件以上)のバーを掴んだ場合は、選択されている全タスクをまとめて動かすグループドラッグにする。
       それ以外(Shiftなしの通常クリック)は選択状態にせず、これまで通りの単体ドラッグにする */
    const groupMode=mode==="move"&&selectedTaskIds.has(t.id)&&selectedTaskIds.size>1;
    if(!groupMode)clearSelection();

    const dup=ev.altKey&&mode==="move"&&!groupMode; /* Alt(Option)+ドラッグ = 複製(単一選択のときのみ) */
    const x0=ev.clientX,y0=ev.clientY;
    const s0=dayIdx(r,t.start),e0=dayIdx(r,t.end);
    let moved=false;
    let target=bar;
    const g=$("#gantt");
    g.classList.add("dragBars");
    lockCursor(dup?"copy":mode==="move"?"grabbing":"ew-resize");
    /* 縦方向にも一定距離ドラッグしたら、並び替え(前後関係の変更)にも対応する(複製ドラッグ以外は単体/グループどちらも対象) */
    const canReorder=mode==="move"&&!dup;
    let vertActive=false,slot=null,slotPhase=null,vItems=null,vV=null,vEls=null,vDragEls=null,vInd=null;
    if(canReorder){
      const lbody=$("#lbody");
      vEls=[...lbody.querySelectorAll(".lrow.phase,.lrow[data-tid]")];
      vItems=vEls.map(el=>el.dataset.tid
        ?{type:"task",t:data.tasks.find(x=>x.id===el.dataset.tid),el}
        :{type:"head",phase:el.dataset.phase||"",el});
      vV=vItems.filter(i=>i.type==="task").map(i=>i.t);
      const vIds=groupMode?[...selectedTaskIds]:[t.id];
      vDragEls=vIds.map(id=>vEls.find(el=>el.dataset.tid===id)).filter(Boolean);
    }
    if(dup){
      target=bar.cloneNode(true);
      target.style.opacity=".75";
      target.style.cursor="copy";
      bar.parentNode.appendChild(target);
      bar.classList.add("activeDrag");
    }
    target.classList.add("activeDrag");
    /* 移動ドラッグ中は、元の位置が分かるよう薄いグレーのゴーストを残しておく(複製ドラッグはbar自身が残るので不要) */
    let ghost=null,groupGhosts=[];
    if(!dup&&mode==="move"){
      ghost=makeBarGhost(bar);
    }
    /* グループドラッグの場合、自分以外の選択中タスクも同時に動かすための情報を集めておく */
    const group=groupMode
      ?[...selectedTaskIds].map(id=>_barReg[id]).filter(x=>x&&x.t!==t).map(x=>({
          bar:x.bar,t:x.t,r:x.r,s0:dayIdx(x.r,x.t.start),e0:dayIdx(x.r,x.t.end)
        }))
      :[];
    if(groupMode)group.forEach(x=>{x.bar.classList.add("activeDrag");groupGhosts.push(makeBarGhost(x.bar));});
    /* ドラッグ中だけ、バーの左右外側に開始日・終了日を表示してわかりやすくする */
    const sLbl=document.createElement("div");sLbl.className="dragEdgeLbl tb s";
    const eLbl=document.createElement("div");eLbl.className="dragEdgeLbl tb";
    target.parentNode.appendChild(sLbl);
    target.parentNode.appendChild(eLbl);
    const updateEdgeLbls=(s,en)=>{
      const leftPx=s*dayW,widthPx=Math.max((en-s+1)*dayW,4);
      sLbl.textContent=dfmt(addD(r.start,s));
      sLbl.style.left=(leftPx-6)+"px";
      const dDays=en-s+1;
      eLbl.innerHTML=`${dfmt(addD(r.start,en))} <span class="dayChip">${dDays}日間${group.length?` 他${group.length}件`:""}</span>`;
      eLbl.style.left=(leftPx+widthPx+6)+"px";
    };
    updateEdgeLbls(s0,e0);
    const mm=e=>{
      let dd=Math.round((e.clientX-x0)/(dayW*uiScale));
      if(dd!==0)moved=true;
      if(canReorder){
        const dyAbs=Math.abs(e.clientY-y0);
        if(dyAbs>10){
          if(!vertActive){
            vertActive=true;moved=true;
            vInd=document.createElement("div");vInd.className="dropInd";
            $("#gantt").appendChild(vInd);
            $("#gantt").classList.add("dragRows");
            vDragEls.forEach(el=>{
              el.classList.add("activeDrag");
              const pr=pairOf(el);if(pr)pr.classList.add("activeDrag");
            });
          }
          const gpane=$("#rpane"),gr=gpane.getBoundingClientRect();
          if(e.clientY<gr.top+56)gpane.scrollTop-=10;
          else if(e.clientY>gr.bottom-40)gpane.scrollTop+=10;
          const y=e.clientY;
          let curPhase="",cnt=0,done=false,indY=null;
          for(const it of vItems){
            const rc=it.el.getBoundingClientRect();
            const mid=rc.top+rc.height/2;
            if(it.type==="head"){
              if(y<mid){slot=cnt;slotPhase=curPhase;indY=ganttTop(it.el);done=true;break;}
              curPhase=it.phase;
              if(y<rc.bottom){slot=cnt;slotPhase=it.phase;indY=ganttTop(it.el,"bottom");done=true;break;}
            }else{
              if(y<mid){slot=cnt;slotPhase=curPhase;indY=ganttTop(it.el);done=true;break;}
              cnt++;
            }
          }
          if(!done){slot=cnt;slotPhase=curPhase;indY=ganttTop(vEls[vEls.length-1],"bottom");}
          vInd.style.top=(indY-1)+"px";
          vInd.style.display="block";
        }else if(vertActive){
          vertActive=false;
          if(vInd)vInd.style.display="none";
        }
      }
      if(groupMode){
        /* 単体ドラッグと同じく、画面外(カレンダーの端の先)へもそのまま動かせるようにする(クランプしない) */
        const s=s0+dd,en=e0+dd;
        target.style.left=(s*dayW)+"px";
        target.dataset.s=s;target.dataset.e=en;
        updateEdgeLbls(s,en);
        group.forEach(x=>{
          const gs=x.s0+dd,ge=x.e0+dd;
          x.bar.style.left=(gs*dayW)+"px";
          x.bar.dataset.s=gs;x.bar.dataset.e=ge;
        });
        return;
      }
      let s=s0,en=e0;
      if(mode==="move"){s=s0+dd;en=e0+dd;}
      else if(mode==="l"){s=Math.min(s0+dd,e0);}
      else{en=Math.max(e0+dd,s0);}
      target.style.left=(s*dayW)+"px";
      target.style.width=Math.max((en-s+1)*dayW,4)+"px";
      target.dataset.s=s;target.dataset.e=en;
      updateEdgeLbls(s,en);
    };
    const mu=()=>{
      document.removeEventListener("mousemove",mm);
      document.removeEventListener("mouseup",mu);
      unlockCursor();
      sLbl.remove();eLbl.remove();
      g.classList.remove("dragBars");
      bar.classList.remove("activeDrag");
      if(ghost)ghost.remove();
      groupGhosts.forEach(gh=>{if(gh)gh.remove();});
      if(vertActive){
        vInd.remove();
        $("#gantt").classList.remove("dragRows");
        vDragEls.forEach(el=>{
          el.classList.remove("activeDrag");
          const pr=pairOf(el);if(pr)pr.classList.remove("activeDrag");
        });
      }
      if(groupMode){
        group.forEach(x=>x.bar.classList.remove("activeDrag"));
        if(moved){
          t.start=fmt(addD(r.start,+bar.dataset.s));
          t.end=fmt(addD(r.start,+bar.dataset.e));
          group.forEach(x=>{
            x.t.start=fmt(addD(x.r.start,+x.bar.dataset.s));
            x.t.end=fmt(addD(x.r.start,+x.bar.dataset.e));
          });
          if(vertActive&&slot!=null){
            /* 選択中の全タスクを、元の相対順序を保ったまま並び替え先へまとめて挿入する */
            const selSet=new Set(selectedTaskIds);
            const selInOrder=vV.filter(x=>selSet.has(x.id));
            const arr=vV.filter(x=>!selSet.has(x.id));
            let removedBefore=0;
            for(let i=0;i<slot;i++){if(selSet.has(vV[i].id))removedBefore++;}
            const ins=slot-removedBefore;
            arr.splice(ins,0,...selInOrder);
            selInOrder.forEach(x=>{x.phase=slotPhase;});
            data.tasks=arr;
          }
          scheduleSave();render();
        }
        return;
      }
      if(dup){
        target.remove();
        if(moved){
          const i=data.tasks.indexOf(t);
          const c=cloneTask(t);
          c.start=fmt(addD(r.start,+target.dataset.s));
          c.end=fmt(addD(r.start,+target.dataset.e));
          data.tasks.splice(i+1,0,c);
          scheduleSave();render();
        }
        return;
      }
      if(moved){
        t.start=fmt(addD(r.start,+bar.dataset.s));
        t.end=fmt(addD(r.start,+bar.dataset.e));
        if(vertActive&&slot!=null){
          const from=vV.indexOf(t);
          const arr=vV.filter(x=>x!==t);
          let ins=slot;if(from<slot)ins--;
          t.phase=slotPhase;
          arr.splice(ins,0,t);
          data.tasks=arr;
        }
        scheduleSave();render();
      }else{
        openTaskModal(t);
      }
    };
    document.addEventListener("mousemove",mm);
    document.addEventListener("mouseup",mu);
  });
}

/* ---------- vertical reorder (tasks) ---------- */
function pairOf(el){
  const rid=el.dataset.tid?`[data-tid="${el.dataset.tid}"]`:null;
  return rid?$("#rinner .rrow"+rid):null;
}
function pairOfPhase(lp){
  const lps=[...$("#lbody").querySelectorAll(".lrow.phase")];
  const rps=[...$("#rinner").querySelectorAll(".rrow.phase")];
  return rps[lps.indexOf(lp)]||null;
}
function ganttTop(el,edge){ /* #gantt基準のY座標 */
  const gr=$("#gantt").getBoundingClientRect();
  const rc=el.getBoundingClientRect();
  return (edge==="bottom"?rc.bottom:rc.top)-gr.top;
}
function startReorder(ev,task){
  /* 複数選択中(2件以上)にそのうちの1つを掴んだ場合は、選択中の全タスクをまとめて並び替える */
  const groupMode=selectedTaskIds.has(task.id)&&selectedTaskIds.size>1;
  const dup=ev.altKey&&!groupMode; /* Alt(Option)+ドラッグ = ドロップ位置に複製(単体のときのみ) */
  const lbody=$("#lbody");
  const els=[...lbody.querySelectorAll(".lrow.phase,.lrow[data-tid]")];
  const items=els.map(el=>el.dataset.tid
    ?{type:"task",t:data.tasks.find(x=>x.id===el.dataset.tid),el}
    :{type:"head",phase:el.dataset.phase||"",el});
  const V=items.filter(i=>i.type==="task").map(i=>i.t);
  const dragEls=(groupMode?[...selectedTaskIds]:[task.id]).map(id=>els.find(el=>el.dataset.tid===id)).filter(Boolean);
  $("#gantt").classList.add("dragRows");
  dragEls.forEach(el=>{
    el.classList.add("activeDrag");
    const pr=pairOf(el);if(pr)pr.classList.add("activeDrag");
  });
  const ind=document.createElement("div");ind.className="dropInd";
  $("#gantt").appendChild(ind);
  lockCursor(dup?"copy":"grabbing");
  let slot=null,slotPhase=null;

  const mm=e=>{
    const g=$("#rpane"),gr=g.getBoundingClientRect();
    if(e.clientY<gr.top+56)g.scrollTop-=10;
    else if(e.clientY>gr.bottom-40)g.scrollTop+=10;
    const y=e.clientY;
    let curPhase="",cnt=0,done=false,indY=null;
    for(const it of items){
      const rc=it.el.getBoundingClientRect();
      const mid=rc.top+rc.height/2;
      if(it.type==="head"){
        if(y<mid){slot=cnt;slotPhase=curPhase;indY=ganttTop(it.el);done=true;break;}
        curPhase=it.phase;
        if(y<rc.bottom){slot=cnt;slotPhase=it.phase;indY=ganttTop(it.el,"bottom");done=true;break;}
      }else{
        if(y<mid){slot=cnt;slotPhase=curPhase;indY=ganttTop(it.el);done=true;break;}
        cnt++;
      }
    }
    if(!done){
      slot=cnt;slotPhase=curPhase;
      indY=ganttTop(els[els.length-1],"bottom");
    }
    ind.style.top=(indY-1)+"px";
    ind.style.display="block";
  };
  const mu=()=>{
    document.removeEventListener("mousemove",mm);
    document.removeEventListener("mouseup",mu);
    ind.remove();
    unlockCursor();
    $("#gantt").classList.remove("dragRows");
    dragEls.forEach(el=>{
      el.classList.remove("activeDrag");
      const pr=pairOf(el);if(pr)pr.classList.remove("activeDrag");
    });
    if(slot==null)return;
    if(groupMode){
      /* 選択中の全タスクを、元の相対順序を保ったまままとめてslot位置へ挿入する */
      const selSet=new Set(selectedTaskIds);
      const selInOrder=V.filter(x=>selSet.has(x.id));
      const arr=V.filter(x=>!selSet.has(x.id));
      let removedBefore=0;
      for(let i=0;i<slot;i++){if(selSet.has(V[i].id))removedBefore++;}
      const ins=slot-removedBefore;
      arr.splice(ins,0,...selInOrder);
      selInOrder.forEach(x=>{x.phase=slotPhase;});
      data.tasks=arr;
    }else if(dup){
      const arr=[...V];
      const c=cloneTask(task);c.phase=slotPhase;
      arr.splice(slot,0,c);
      data.tasks=arr;
    }else{
      const from=V.indexOf(task);
      const arr=V.filter(t=>t!==task);
      let ins=slot;if(from<slot)ins--;
      task.phase=slotPhase;
      arr.splice(ins,0,task);
      data.tasks=arr;
    }
    scheduleSave();render();
  };
  document.addEventListener("mousemove",mm);
  document.addEventListener("mouseup",mu);
}

/* ---------- vertical reorder (phases) ---------- */
function startPhaseReorder(ev,phase){
  const lbody=$("#lbody");
  const heads=[...lbody.querySelectorAll(".lrow.phase")];
  const dragEl=heads.find(el=>(el.dataset.phase||"")===phase);
  $("#gantt").classList.add("dragRows");
  const actives=[dragEl];
  const rp=pairOfPhase(dragEl);if(rp)actives.push(rp);
  for(const t of data.tasks.filter(x=>(x.phase||"")===phase)){
    const le=lbody.querySelector(`.lrow[data-tid="${t.id}"]`);
    if(le){actives.push(le);const pr=pairOf(le);if(pr)actives.push(pr);}
  }
  actives.forEach(el=>el.classList.add("activeDrag"));
  const ind=document.createElement("div");ind.className="dropInd";
  $("#gantt").appendChild(ind);
  lockCursor("grabbing");
  let to=null;

  const mm=e=>{
    const g=$("#rpane"),gr=g.getBoundingClientRect();
    if(e.clientY<gr.top+56)g.scrollTop-=10;
    else if(e.clientY>gr.bottom-40)g.scrollTop+=10;
    const y=e.clientY;
    let k=heads.length;
    for(let i=0;i<heads.length;i++){
      const rc=heads[i].getBoundingClientRect();
      if(y<rc.top+rc.height/2){k=i;break;}
    }
    to=k;
    let indY;
    if(k<heads.length)indY=ganttTop(heads[k]);
    else indY=ganttTop(lbody.lastElementChild,"bottom");
    ind.style.top=(indY-1)+"px";
    ind.style.display="block";
  };
  const mu=()=>{
    document.removeEventListener("mousemove",mm);
    document.removeEventListener("mouseup",mu);
    ind.remove();
    unlockCursor();
    $("#gantt").classList.remove("dragRows");
    actives.forEach(el=>el.classList.remove("activeDrag"));
    if(to==null)return;
    const from=data.phases.indexOf(phase);
    const arr=data.phases.filter(p=>p!==phase);
    let ins=to;if(from<to)ins--;
    arr.splice(ins,0,phase);
    data.phases=arr;
    scheduleSave();render();
  };
  document.addEventListener("mousemove",mm);
  document.addEventListener("mouseup",mu);
}

/* ---------- column resizers ---------- */
function setupColResizers(){
  const gv=n=>parseInt(getComputedStyle(document.documentElement).getPropertyValue(n));
  $("#resMain").title="ドラッグで列全体の幅を変更 / ダブルクリックで自動幅に戻す";
  $("#resAsg").title="ドラッグで担当列の幅を変更 / ダブルクリックで自動幅に戻す";
  $("#resMain").addEventListener("dblclick",()=>{
    if(data.ui){delete data.ui.leftW;delete data.ui.asgW;}
    scheduleSave();render();
  });
  $("#resAsg").addEventListener("dblclick",()=>{
    if(data.ui){delete data.ui.leftW;}
    scheduleSave();render();
  });
  $("#resMain").addEventListener("mousedown",e=>{
    e.preventDefault();
    const x0=e.clientX,lw0=gv("--leftW"),aw0=gv("--asgW");
    lockCursor("col-resize");
    const mm=ev=>{
      /* タスク名の幅は変えず、担当列の幅(=左ペイン全体もその分)を変える */
      const delta=(ev.clientX-x0)/uiScale;
      const lw=Math.min(Math.max(lw0+delta,200),560);
      const aw=Math.min(Math.max(aw0+delta,44),200);
      document.documentElement.style.setProperty("--leftW",lw+"px");
      document.documentElement.style.setProperty("--asgW",aw+"px");
    };
    const mu=()=>{
      document.removeEventListener("mousemove",mm);
      document.removeEventListener("mouseup",mu);
      unlockCursor();
      data.ui={...(data.ui||{}),leftW:gv("--leftW"),asgW:gv("--asgW")};
      scheduleSave();render();
    };
    document.addEventListener("mousemove",mm);
    document.addEventListener("mouseup",mu);
  });
  $("#resAsg").addEventListener("mousedown",e=>{
    e.preventDefault();
    const x0=e.clientX,lw0=gv("--leftW");
    lockCursor("col-resize");
    const mm=ev=>{
      /* 担当列の幅は固定のまま、タスク名側の幅(=左ペイン全体)だけを変える */
      const lw=Math.min(Math.max(lw0+(ev.clientX-x0)/uiScale,200),560);
      document.documentElement.style.setProperty("--leftW",lw+"px");
    };
    const mu=()=>{
      document.removeEventListener("mousemove",mm);
      document.removeEventListener("mouseup",mu);
      unlockCursor();
      data.ui={...(data.ui||{}),leftW:gv("--leftW")};
      scheduleSave();render();
    };
    document.addEventListener("mousemove",mm);
    document.addEventListener("mouseup",mu);
  });
}

/* ---------- text export ---------- */
function buildText(md){
  const h1=s=>md?`# ${s}`:`■ ${s}`;
  const h2=s=>md?`## ${s}`:`【${s}】`;
  const bullet=md?"-":"・";
  const lines=[];
  lines.push(h1(data.projectName||"(無題のプロジェクト)"));
  const allDates=[...data.tasks.map(t=>t.start),...data.tasks.map(t=>t.end),...data.milestones.map(m=>m.date)].sort();
  const metaLine=[];
  if(allDates.length)metaLine.push(`期間: ${dfmtW(parse(allDates[0]))} 〜 ${dfmtW(parse(allDates[allDates.length-1]))}`);
  if(data.eventDate)metaLine.push(`本番日: ${dfmtW(parse(data.eventDate))}${data.eventEndDate?`〜${dfmtW(parse(data.eventEndDate))}`:""}`);
  if(metaLine.length)lines.push(metaLine.join("　|　"));
  lines.push(`出力日時: ${nowStamp()}`);
  if(data.milestones.length){
    lines.push("",h2("マイルストーン"));
    for(const m of [...data.milestones].sort((a,b)=>a.date<b.date?-1:1)){
      const dateStr=`${dfmtW(parse(m.date))}${m.end?`〜${dfmtW(parse(m.end))}`:""}`;
      lines.push(`◆ ${md?`\`${dateStr}\``:dateStr} ${m.name}`);
    }
  }
  for(const g of groupsOf()){
    if(!g.tasks.length)continue;
    lines.push("",h2(g.phase||"未分類"));
    for(const t of g.tasks){
      const mems=membersOf(t),cats=catsOf(t);
      const dateRange=`${dfmtW(parse(t.start))}〜${dfmtW(parse(t.end))}`;
      lines.push(`${bullet} ${md?`\`${dateRange}\``:dateRange} ${t.name}${cats.length?` [${cats.map(c=>c.name).join("/")}]`:""}${mems.length?` (${mems.map(x=>x.name).join("・")})`:""}`);
    }
  }
  return lines.join("\n");
}
function dfmtW(d){return `${d.getMonth()+1}月${d.getDate()}日(${WD[d.getDay()]})`;}
function esc2(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;")}
function openTextModal(){
  let md=true;
  openModal(`
    <h2>テキスト出力</h2>
    <div class="seg" id="txtFmtSeg" style="margin-bottom:8px;display:inline-flex">
      <button class="on" data-md="1">Markdown(Discord向け)</button><button data-md="0">プレーンテキスト</button>
    </div>
    <textarea id="txtOut" readonly>${esc2(buildText(md))}</textarea>
    <div class="mFoot">
      <span id="copied" style="color:var(--muted);font-size:11px;align-self:center"></span>
      <div class="spacer"></div>
      <button class="btn" id="tClose">閉じる</button>
      <button class="btn primary" id="tCopy">コピー</button>
    </div>
  `,true);
  document.querySelectorAll("#txtFmtSeg button").forEach(b=>b.onclick=()=>{
    document.querySelectorAll("#txtFmtSeg button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    md=b.dataset.md==="1";
    $("#txtOut").value=buildText(md);
    $("#copied").textContent="";
  });
  $("#tClose").onclick=closeModal;
  $("#tCopy").onclick=async()=>{
    const ta=$("#txtOut");
    try{await navigator.clipboard.writeText(ta.value);}
    catch(e){ta.select();document.execCommand("copy");}
    $("#copied").textContent="コピーしました";
  };
}

/* ---------- popover ---------- */
let _popCleanup=null;
function openPopover(x,y,html){
  closePopover();
  const p=$("#popover");
  p.innerHTML=html;p.hidden=false;
  p.style.left=x+"px";p.style.top=y+"px";
  requestAnimationFrame(()=>{
    const px=Math.min(Math.max(x,8),window.innerWidth-p.offsetWidth-8);
    const py=Math.min(Math.max(y,8),window.innerHeight-p.offsetHeight-8);
    p.style.left=px+"px";p.style.top=py+"px";
  });
  const onDoc=e=>{if(!p.contains(e.target))closePopover();};
  setTimeout(()=>document.addEventListener("mousedown",onDoc),0);
  _popCleanup=()=>document.removeEventListener("mousedown",onDoc);
}
function closePopover(){
  const p=$("#popover");
  p.hidden=true;p.innerHTML="";
  if(_popCleanup){_popCleanup();_popCleanup=null;}
}

      <div class="field"><label>終了日</label><input type="date" id="fEnd" value="${d.end}"></div>
